<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Victory splash</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff;
      }

      #splash {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.45s ease;
      }

      #splash.visible {
        opacity: 1;
      }

      #splash.fading {
        opacity: 0;
      }

      .burst {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.35);
        animation: ring-out 1.1s ease-out forwards;
      }

      .burst:nth-child(2) {
        animation-delay: 0.08s;
      }
      .burst:nth-child(3) {
        animation-delay: 0.16s;
      }

      @keyframes ring-out {
        0% {
          transform: scale(0.2);
          opacity: 1;
        }
        100% {
          transform: scale(14);
          opacity: 0;
        }
      }

      .card {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 28px 48px 32px;
        background: radial-gradient(
          ellipse at center,
          rgba(20, 24, 40, 0.92) 0%,
          rgba(10, 12, 22, 0.88) 70%,
          rgba(0, 0, 0, 0.75) 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        box-shadow:
          0 0 60px rgba(120, 180, 255, 0.25),
          0 24px 48px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(12px);
        transform: scale(0.65);
        opacity: 0;
      }

      #splash.visible .card {
        animation: card-in 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes card-in {
        0% {
          transform: scale(0.65);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .label {
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.35em;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 10px;
        animation: label-glow 2s ease-in-out infinite;
      }

      @keyframes label-glow {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 0.95;
        }
      }

      .winner-name {
        font-size: 52px;
        font-weight: 800;
        line-height: 1.15;
        max-width: 900px;
        text-shadow:
          0 0 40px rgba(255, 220, 120, 0.45),
          0 4px 24px rgba(0, 0, 0, 0.8);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #ffe066 40%,
          #ffd43b 60%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine 2.5s linear infinite;
      }

      .winner-name.draw {
        background: linear-gradient(
          135deg,
          #e9ecef 0%,
          #adb5bd 50%,
          #dee2e6 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
        animation: none;
      }

      /* Match overlay .player-name.red / .player-name.blue */
      .winner-name.p1 {
        text-shadow:
          0 0 48px rgba(255, 107, 107, 0.55),
          0 4px 24px rgba(0, 0, 0, 0.8);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #ff8a8a 35%,
          #ff6b6b 50%,
          #ee5a5a 65%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 2.5s linear infinite;
      }

      .winner-name.p2 {
        text-shadow:
          0 0 48px rgba(116, 185, 255, 0.55),
          0 4px 24px rgba(0, 0, 0, 0.8);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #a8d5ff 35%,
          #74b9ff 50%,
          #4a9eff 65%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 2.5s linear infinite;
      }

      @keyframes shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      .sub {
        margin-top: 14px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.06em;
      }

      .winner-sprite {
        display: none;
        margin: 0 auto 16px;
        max-height: 140px;
        max-width: 180px;
        width: auto;
        height: auto;
        object-fit: contain;
        image-rendering: pixelated;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.65));
      }

      .winner-sprite.is-visible {
        display: block;
      }
    </style>
  </head>
  <body data-victory-visible-ms="{{ victory_modal_ms }}">
    <div id="splash" aria-live="polite">
      <div class="burst"></div>
      <div class="burst"></div>
      <div class="burst"></div>
      <div class="card">
        <div class="label" id="splash-label">Winner</div>
        <img class="winner-sprite" id="splash-sprite" alt="" />
        <div class="winner-name" id="splash-name"></div>
        <div class="sub" id="splash-sub"></div>
      </div>
    </div>

    <audio
      id="victory-sfx"
      preload="auto"
      playsinline
      style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none"
    >
      <source src="/static/audio/victory.mp3" type="audio/mpeg" />
    </audio>

    <script src="/static/format-utils.js"></script>
    <script>
      var $splash = document.getElementById("splash");
      var $label = document.getElementById("splash-label");
      var $sprite = document.getElementById("splash-sprite");
      var $name = document.getElementById("splash-name");
      var $sub = document.getElementById("splash-sub");
      var $victorySfx = document.getElementById("victory-sfx");
      var victoryVisibleMs = parseInt(
        document.body.getAttribute("data-victory-visible-ms") || "30000",
        10
      );
      if (!Number.isFinite(victoryVisibleMs) || victoryVisibleMs < 1) {
        victoryVisibleMs = 30000;
      }

      // Two-poll bootstrap: the first /scoreboard response may already include a
      // match posted during load (e.g. curl test). Compare 2nd poll to 1st to
      // detect an increase; after that use lastTotalMatches only.
      var firstPollTotal = null;
      var lastTotalMatches = -1;
      var hideTimer = null;
      var showDelayTimer = null;
      var VICTORY_SHOW_DELAY_MS = 3000;

      function stopVictorySfx() {
        if (!$victorySfx) return;
        $victorySfx.pause();
        $victorySfx.currentTime = 0;
      }

      function playVictorySfx() {
        if (!$victorySfx) return;
        $victorySfx.currentTime = 0;
        var p = $victorySfx.play();
        if (p && typeof p.catch === "function") {
          p.catch(function () {});
        }
      }

      function resetBursts() {
        var root = $splash;
        var bursts = root.querySelectorAll(".burst");
        bursts.forEach(function (el) {
          var clone = el.cloneNode(true);
          el.parentNode.replaceChild(clone, el);
        });
      }

      function showVictory(match, p1, p2, p1Sprite, p2Sprite) {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        if (showDelayTimer) {
          clearTimeout(showDelayTimer);
          showDelayTimer = null;
        }

        var winner = (match && match.winner) || "Unknown";
        var isDraw = winner === "Draw";

        var spriteUrl = "";
        if (!isDraw) {
          if (winner === p1) spriteUrl = (p1Sprite || "").trim();
          else if (winner === p2) spriteUrl = (p2Sprite || "").trim();
        }
        $sprite.classList.remove("is-visible");
        $sprite.onload = null;
        $sprite.onerror = null;
        if (spriteUrl) {
          $sprite.alt = winner + " trainer";
          $sprite.removeAttribute("width");
          $sprite.removeAttribute("height");
          $sprite.onload = function () {
            $sprite.classList.add("is-visible");
          };
          $sprite.onerror = function () {
            $sprite.classList.remove("is-visible");
            $sprite.removeAttribute("src");
          };
          if ($sprite.getAttribute("src") === spriteUrl) {
            $sprite.removeAttribute("src");
            void $sprite.offsetWidth;
          }
          $sprite.src = spriteUrl;
        } else {
          $sprite.alt = "";
          $sprite.removeAttribute("src");
        }

        $label.textContent = isDraw ? "Match result" : "Winner";
        $name.className = "winner-name";
        if (isDraw) {
          $name.classList.add("draw");
        } else if (winner === p1) {
          $name.classList.add("p1");
        } else if (winner === p2) {
          $name.classList.add("p2");
        }
        $name.textContent = winner;

        var parts = [];
        if (match && match.battle_format) {
          var fmt = displayBattleFormat(match.battle_format);
          if (fmt && fmt !== "--") parts.push(fmt);
        }
        if (p1 && p2) {
          parts.push(p1 + " vs " + p2);
        }
        $sub.textContent = parts.length ? parts.join(" · ") : "";

        showDelayTimer = setTimeout(function () {
          showDelayTimer = null;
          $splash.classList.remove("fading");
          resetBursts();
          void $splash.offsetWidth;
          $splash.classList.add("visible");
          playVictorySfx();

          hideTimer = setTimeout(function () {
            stopVictorySfx();
            $splash.classList.add("fading");
            hideTimer = setTimeout(function () {
              $splash.classList.remove("visible", "fading");
              hideTimer = null;
            }, 500);
          }, victoryVisibleMs);
        }, VICTORY_SHOW_DELAY_MS);
      }

      async function tick() {
        try {
          var resp = await fetch("/scoreboard", { cache: "no-store" });
          var data = await resp.json();
          var total = data.total_matches || 0;
          var p1 = data.player1_name || "Player 1";
          var p2 = data.player2_name || "Player 2";

          if (firstPollTotal === null) {
            firstPollTotal = total;
            return;
          }
          if (lastTotalMatches < 0) {
            if (total > firstPollTotal && data.last_match) {
              showVictory(
                data.last_match,
                p1,
                p2,
                data.player1_sprite_url,
                data.player2_sprite_url
              );
            }
            lastTotalMatches = total;
            return;
          }
          if (total > lastTotalMatches && data.last_match) {
            lastTotalMatches = total;
            showVictory(
              data.last_match,
              p1,
              p2,
              data.player1_sprite_url,
              data.player2_sprite_url
            );
          }
        } catch (_) {}
      }

      tick();
      setInterval(tick, 800);
    </script>
  </body>
</html>
