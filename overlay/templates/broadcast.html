<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>{{ stream_title }}</title>
    <style>
      html,
      body {
        margin: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #0b1020;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      .scene {
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
      }

      .battle-frame {
        position: absolute;
        inset: 0;
        width: 1280px;
        height: 720px;
        border: 0;
        background: #0b1020;
      }

      .overlay-frame {
        position: absolute;
        inset: 0;
        width: 1280px;
        height: 720px;
        border: 0;
        background: transparent;
        pointer-events: none;
      }

      /* Full-frame winner splash; above scoreboard overlay, below nothing critical */
      .victory-frame {
        position: absolute;
        inset: 0;
        width: 1280px;
        height: 720px;
        border: 0;
        background: transparent;
        pointer-events: none;
        z-index: 14;
      }

      .stream-title {
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        white-space: nowrap;
      }

      .top-left-bar {
        position: absolute;
        left: 16px;
        top: 10px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: none;
      }

      .battle-format {
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.48);
        color: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        pointer-events: none;
      }

      .thoughts-wrap {
        position: absolute;
        left: 4px;
        right: 645px;
        bottom: 5px;
        z-index: 12;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        pointer-events: none;
      }

      .thoughts-panel {
        background: rgba(4, 10, 24, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        backdrop-filter: blur(8px);
        padding: 10px 12px;
        height: 136px;
        overflow: hidden;
      }

      .thoughts-title {
        font-size: 12px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 6px;
        font-weight: 700;
      }

      /* Match overlay scoreboard .player-name.red / .player-name.blue */
      .thoughts-title.red {
        color: #ff6b6b;
      }

      .thoughts-title.blue {
        color: #74b9ff;
      }

      .thoughts-scroll {
        height: 102px;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .thoughts-scroll::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .thought-line {
        font-size: 12px;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 6px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .thought-line .meta {
        display: inline-block;
        margin-right: 6px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 11px;
        font-weight: 600;
      }
    </style>
    <script src="/static/format-utils.js"></script>
  </head>

  <body>
    <div class="scene">
      <div class="top-left-bar">
        <div class="stream-title">{{ stream_title }}</div>
        <div class="battle-format" id="battle-format-label">Format: --</div>
      </div>
      <iframe
        class="battle-frame"
        id="battle-frame"
        src="{{ showdown_internal_url }}"
        title="Pokémon Showdown"
        allow="autoplay; fullscreen"
        allowfullscreen
      >
      </iframe>
      <iframe class="overlay-frame" src="/overlay" title="Scoreboard Overlay">
      </iframe>
      <iframe
        class="victory-frame"
        src="/victory"
        title="Victory splash"
      ></iframe>
      <div class="thoughts-wrap">
        <section class="thoughts-panel">
          <div class="thoughts-title red" id="thoughts-title-p1">Player 1</div>
          <div class="thoughts-scroll" id="thoughts-p1"></div>
        </section>
        <section class="thoughts-panel">
          <div class="thoughts-title blue" id="thoughts-title-p2">Player 2</div>
          <div class="thoughts-scroll" id="thoughts-p2"></div>
        </section>
      </div>
    </div>
    <script>
      // If viewed from host browser (localhost), use localhost showdown URL.
      // If viewed from stream container (hostname "overlay"), keep internal Docker URL.
      const battleFrame = document.getElementById("battle-frame");
      const battleFormatLabel = document.getElementById("battle-format-label");
      const isLocal =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      const showdownBaseRaw = isLocal
        ? "{{ showdown_local_url }}"
        : "{{ showdown_internal_url }}";

      // Build a stable Showdown base URL (no cache-bust — reload is controlled explicitly).
      function showdownBaseUrl() {
        const u = new URL(showdownBaseRaw);
        u.pathname = "/";
        return u.toString();
      }

      const stableBase = showdownBaseUrl();
      let currentBattleTag = null;
      battleFrame.src = stableBase;

      function syncThoughtPanelHeights() {
        try {
          var src = (battleFrame && battleFrame.src) || "";
          var searchIndex = src.indexOf("?");
          var searchPart = "";
          if (searchIndex !== -1) {
            searchPart = src.slice(searchIndex + 1);
          }
          var sp = new URLSearchParams(searchPart);
          var enabled = sp.has("hide_battle_ui");

          var panelHeight = enabled ? 270 : 136;
          var scrollHeight = enabled ? 250 : 102;

          document.querySelectorAll(".thoughts-panel").forEach((el) => {
            el.style.height = panelHeight + "px";
          });
          document.querySelectorAll(".thoughts-scroll").forEach((el) => {
            el.style.height = scrollHeight + "px";
          });
        } catch (_) {
          // ignore
        }
      }

      syncThoughtPanelHeights();

      function normalizeBattleTag(tag) {
        if (!tag) return null;
        let normalized = String(tag).trim();
        normalized = normalized.replace(/^>+/, "").replace(/^\/+/, "");
        if (!normalized) return null;
        if (!normalized.startsWith("battle-")) {
          normalized = `battle-${normalized}`;
        }
        return normalized;
      }

      async function refreshBattleTarget() {
        try {
          const resp = await fetch("/current_battle", { cache: "no-store" });
          const data = await resp.json();
          if (battleFormatLabel) {
            battleFormatLabel.textContent = `Format: ${displayBattleFormat(data.battle_format)}`;
          }
          maybeReloadBetweenMatches(data.status);
          if (data.status === "live" && data.battle_tag) {
            const tag = normalizeBattleTag(data.battle_tag);
            if (tag && tag !== currentBattleTag) {
              currentBattleTag = tag;
              // Cache-bust forces a full iframe reload only when the battle changes.
              const u = new URL(stableBase);
              u.searchParams.set("_", String(Date.now()));
              battleFrame.src = `${u.toString()}#${tag}`;
              syncThoughtPanelHeights();
            }
          }
        } catch (_) {
          // keep current view
        }
      }

      // Periodic full-page reload between matches to flush Chromium memory.
      // Only triggers when the battle status is "idle" (between matches) and
      // the page has been alive for at least 30 minutes.
      const PAGE_LOAD_TIME = Date.now();
      const RELOAD_AFTER_MS = 30 * 60 * 1000;
      let lastSeenStatus = "";

      function maybeReloadBetweenMatches(status) {
        lastSeenStatus = status || "";
        if (
          lastSeenStatus === "idle" &&
          Date.now() - PAGE_LOAD_TIME > RELOAD_AFTER_MS
        ) {
          location.reload();
        }
      }

      refreshBattleTarget();
      setInterval(refreshBattleTarget, 3000);

      const thoughtsP1 = document.getElementById("thoughts-p1");
      const thoughtsP2 = document.getElementById("thoughts-p2");
      const thoughtsTitleP1 = document.getElementById("thoughts-title-p1");
      const thoughtsTitleP2 = document.getElementById("thoughts-title-p2");
      let thoughtPlayer1 = "Player 1";
      let thoughtPlayer2 = "Player 2";

      function setThoughtPlayerNames(p1, p2) {
        thoughtPlayer1 = p1 || thoughtPlayer1;
        thoughtPlayer2 = p2 || thoughtPlayer2;
        if (thoughtsTitleP1) thoughtsTitleP1.textContent = thoughtPlayer1;
        if (thoughtsTitleP2) thoughtsTitleP2.textContent = thoughtPlayer2;
      }

      async function refreshThoughtNamesFromScoreboard() {
        try {
          const resp = await fetch("/scoreboard", { cache: "no-store" });
          const data = await resp.json();
          const p1 = data?.player1_name;
          const p2 = data?.player2_name;
          if (p1 && p2) {
            setThoughtPlayerNames(p1, p2);
            return;
          }
          const wins = data?.wins || {};
          const names = Object.keys(wins);
          if (names.length >= 2) setThoughtPlayerNames(names[0], names[1]);
        } catch (_) {}
      }

      function renderThoughtList(target, items) {
        if (!target) return;
        if (!Array.isArray(items) || !items.length) {
          target.innerHTML =
            '<div class="thought-line"><span class="meta">--</span>Waiting for thoughts...</div>';
          return;
        }
        const lastItems = items.slice(-14);
        target.innerHTML = lastItems
          .map((item) => {
            const turn = Number.isFinite(item?.turn) ? `T${item.turn}` : "T?";
            const action = item?.action ? String(item.action) : "action";
            const reasoning = item?.reasoning ? String(item.reasoning) : "";
            const safeReasoning = reasoning
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;");
            return `<div class="thought-line"><span class="meta">${turn} ${action}</span>${safeReasoning}</div>`;
          })
          .join("");
        target.scrollTop = target.scrollHeight;
      }

      // Monotonic id so the battle iframe never drops an update when Date.now()
      // matches the previous message (e.g. multiple protocol lines in one chunk).
      let calloutMessageSeq = 0;
      function postCalloutsToBattleFrame(p1Callout, p2Callout) {
        try {
          if (!battleFrame || !battleFrame.contentWindow) return;
          calloutMessageSeq += 1;
          battleFrame.contentWindow.postMessage(
            {
              type: "llm_callouts",
              p1_callout: p1Callout || "",
              p2_callout: p2Callout || "",
              version: calloutMessageSeq,
            },
            "*",
          );
        } catch (_) {}
      }

      // --- WebSocket thought feed + callout queue ---

      const thoughtItems = {};
      const calloutQueue = [];
      const pendingCalloutsBySide = { p1: [], p2: [] };
      const unreleasedActionTsBySide = { p1: 0, p2: 0 };
      const UNRELEASED_ACTION_MAX_AGE_MS = 4000;
      let calloutPlaying = false;
      const CALLOUT_DISPLAY_MS = 3200;

      function syncPlayerNamesFromThoughts() {
        const keys = Object.keys(thoughtItems);
        const p1Has = thoughtPlayer1 && keys.includes(thoughtPlayer1);
        const p2Has = thoughtPlayer2 && keys.includes(thoughtPlayer2);
        if (keys.length === 1 && !p1Has) {
          setThoughtPlayerNames(keys[0], thoughtPlayer2);
        } else if (keys.length >= 2 && (!p1Has || !p2Has)) {
          const sorted = keys.slice().sort();
          setThoughtPlayerNames(sorted[0], sorted[1]);
        }
      }

      function renderAllThoughtPanels() {
        syncPlayerNamesFromThoughts();
        renderThoughtList(thoughtsP1, thoughtItems[thoughtPlayer1] || []);
        renderThoughtList(thoughtsP2, thoughtItems[thoughtPlayer2] || []);
      }

      function enqueueDisplayCallout(side, text) {
        calloutQueue.push({ side, text });
      }

      function releasePendingCalloutForSide(side) {
        if (side !== "p1" && side !== "p2") return;
        const pending = pendingCalloutsBySide[side];
        if (!pending || !pending.length) return;
        const item = pending.shift();
        if (!item || !item.text) return;
        enqueueDisplayCallout(side, item.text);
        drainCalloutQueue();
      }

      function drainCalloutQueue() {
        if (calloutPlaying || !calloutQueue.length) return;
        calloutPlaying = true;
        const { side, text } = calloutQueue.shift();
        const p1 = side === "p1" ? text : "";
        const p2 = side === "p2" ? text : "";
        postCalloutsToBattleFrame(p1, p2);
        setTimeout(() => {
          calloutPlaying = false;
          drainCalloutQueue();
        }, CALLOUT_DISPLAY_MS);
      }

      function handleThoughtsMessage(msg) {
        if (msg.type === "history") {
          for (const k of Object.keys(thoughtItems)) delete thoughtItems[k];
          const players = msg.players || {};
          for (const [player, items] of Object.entries(players)) {
            thoughtItems[player] = Array.isArray(items) ? items : [];
          }
          renderAllThoughtPanels();
        } else if (msg.type === "thought") {
          const player = msg.player || "";
          if (!player) return;
          if (!thoughtItems[player]) thoughtItems[player] = [];
          thoughtItems[player].push({
            timestamp: msg.timestamp,
            turn: msg.turn,
            action: msg.action,
            reasoning: msg.reasoning,
            callout: msg.callout,
          });
          if (thoughtItems[player].length > 80) {
            thoughtItems[player] = thoughtItems[player].slice(-80);
          }
          renderAllThoughtPanels();
          const callout = (msg.callout || "").trim();
          if (callout) {
            const bs = String(msg.battle_side || "")
              .trim()
              .toLowerCase();
            const side =
              bs === "p1" || bs === "p2"
                ? bs
                : player === thoughtPlayer1
                  ? "p1"
                  : "p2";
            const actionAge =
              Date.now() - (unreleasedActionTsBySide[side] || 0);
            if (actionAge < UNRELEASED_ACTION_MAX_AGE_MS) {
              unreleasedActionTsBySide[side] = 0;
              pendingCalloutsBySide[side] = [];
              enqueueDisplayCallout(side, callout);
              drainCalloutQueue();
            } else {
              pendingCalloutsBySide[side] = [
                {
                  text: callout,
                  turn: msg.turn,
                  action: msg.action,
                  timestamp: msg.timestamp,
                },
              ];
            }
          }
        } else if (msg.type === "clear") {
          for (const k of Object.keys(thoughtItems)) delete thoughtItems[k];
          pendingCalloutsBySide.p1.length = 0;
          pendingCalloutsBySide.p2.length = 0;
          unreleasedActionTsBySide.p1 = 0;
          unreleasedActionTsBySide.p2 = 0;
          calloutQueue.length = 0;
          calloutPlaying = false;
          renderAllThoughtPanels();
          postCalloutsToBattleFrame("", "");
        }
      }

      window.addEventListener("message", (event) => {
        const data = event && event.data;
        if (!data) return;
        if (!battleFrame || event.source !== battleFrame.contentWindow) return;

        if (data.type === "battle_action") {
          const side =
            data.side === "p1" ? "p1" : data.side === "p2" ? "p2" : "";
          if (!side) return;
          const pending = pendingCalloutsBySide[side];
          if (pending && pending.length) {
            unreleasedActionTsBySide[side] = 0;
            releasePendingCalloutForSide(side);
          } else {
            unreleasedActionTsBySide[side] = Date.now();
          }
        } else if (data.type === "battle_turn") {
          for (const s of ["p1", "p2"]) {
            releasePendingCalloutForSide(s);
          }
        }
      });

      function connectThoughtsWS() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const url = `${proto}//${location.host}/thoughts/ws`;
        const ws = new WebSocket(url);
        ws.onmessage = (event) => {
          try {
            handleThoughtsMessage(JSON.parse(event.data));
          } catch (_) {}
        };
        ws.onclose = () => setTimeout(connectThoughtsWS, 2000);
        ws.onerror = () => ws.close();
      }

      refreshThoughtNamesFromScoreboard();
      setInterval(refreshThoughtNamesFromScoreboard, 5000);
      connectThoughtsWS();
    </script>
  </body>
</html>
