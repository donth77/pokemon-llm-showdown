<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Victory splash</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff;
      }

      #splash {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.45s ease;
      }

      #splash.visible {
        opacity: 1;
      }

      #splash.fading {
        opacity: 0;
      }

      .burst {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.35);
        animation: ring-out 1.1s ease-out forwards;
      }

      .burst:nth-child(2) {
        animation-delay: 0.08s;
      }
      .burst:nth-child(3) {
        animation-delay: 0.16s;
      }

      @keyframes ring-out {
        0% {
          transform: scale(0.2);
          opacity: 1;
        }
        100% {
          transform: scale(14);
          opacity: 0;
        }
      }

      .card {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 28px 48px 32px;
        background: radial-gradient(
          ellipse at center,
          rgba(20, 24, 40, 0.92) 0%,
          rgba(10, 12, 22, 0.88) 70%,
          rgba(0, 0, 0, 0.75) 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        box-shadow:
          0 0 60px rgba(120, 180, 255, 0.25),
          0 24px 48px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(12px);
        transform: scale(0.65);
        opacity: 0;
      }

      #splash.visible .card {
        animation: card-in 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes card-in {
        0% {
          transform: scale(0.65);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .label {
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.35em;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 10px;
        animation: label-glow 2s ease-in-out infinite;
      }

      .label.tournament-champ {
        color: rgba(255, 236, 180, 0.95);
        text-shadow:
          0 0 20px rgba(255, 200, 80, 0.55),
          0 0 40px rgba(218, 165, 32, 0.35);
        animation: label-glow-gold 2s ease-in-out infinite;
      }

      @keyframes label-glow-gold {
        0%,
        100% {
          opacity: 0.88;
          filter: brightness(1);
        }
        50% {
          opacity: 1;
          filter: brightness(1.15);
        }
      }

      @keyframes label-glow {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 0.95;
        }
      }

      .winner-name {
        font-size: 52px;
        font-weight: 800;
        line-height: 1.15;
        max-width: 900px;
        text-shadow:
          0 0 40px rgba(255, 220, 120, 0.45),
          0 4px 24px rgba(0, 0, 0, 0.8);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #ffe066 40%,
          #ffd43b 60%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine 2.5s linear infinite;
      }

      .winner-name.draw {
        background: linear-gradient(
          135deg,
          #e9ecef 0%,
          #adb5bd 50%,
          #dee2e6 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
        animation: none;
      }

      /* Match overlay .player-name.red / .player-name.blue */
      .winner-name.p1 {
        text-shadow:
          0 0 48px rgba(255, 107, 107, 0.55),
          0 4px 24px rgba(0, 0, 0, 0.8);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #ff8a8a 35%,
          #ff6b6b 50%,
          #ee5a5a 65%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 2.5s linear infinite;
      }

      .winner-name.p2 {
        text-shadow:
          0 0 48px rgba(116, 185, 255, 0.55),
          0 4px 24px rgba(0, 0, 0, 0.8);
        background: linear-gradient(
          135deg,
          #fff 0%,
          #a8d5ff 35%,
          #74b9ff 50%,
          #4a9eff 65%,
          #fff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 2.5s linear infinite;
      }

      .winner-name.tournament-champ {
        text-shadow:
          0 0 32px rgba(255, 215, 0, 0.75),
          0 0 72px rgba(255, 160, 40, 0.45),
          0 4px 28px rgba(0, 0, 0, 0.9);
        background: linear-gradient(
          125deg,
          #fffef5 0%,
          #ffe066 18%,
          #ffd700 35%,
          #ffb700 50%,
          #ffd700 62%,
          #fff8dc 78%,
          #ffec80 100%
        );
        background-size: 220% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine-gold 2.4s linear infinite;
      }

      @keyframes shine-gold {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 220% center;
        }
      }

      @keyframes shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      .sub {
        margin-top: 14px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.06em;
        max-width: 880px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        line-height: 1.4;
      }

      .sub .sub-battle-format {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.05em;
      }

      .sub .sub-tourney {
        color: rgba(200, 220, 255, 0.92);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .sub .sub-vs {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
      }

      .winner-portrait {
        display: none;
        margin: 0 auto 16px;
        width: 168px;
        height: 168px;
        object-fit: cover;
        object-position: center top;
        border-radius: 16px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 10px 32px rgba(0, 0, 0, 0.55);
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.65));
      }

      .winner-portrait.is-visible {
        display: block;
      }
    </style>
  </head>
  <body
    data-victory-visible-ms="{{ victory_modal_ms }}"
    data-tournament-victory-visible-ms="{{ tournament_victory_modal_ms }}"
    data-victory-show-delay-ms="{{ victory_show_delay_ms }}"
  >
    <div id="splash" aria-live="polite">
      <div class="burst"></div>
      <div class="burst"></div>
      <div class="burst"></div>
      <div class="card">
        <div class="label" id="splash-label">Winner</div>
        <img class="winner-portrait" id="splash-portrait" alt="" />
        <div class="winner-name" id="splash-name"></div>
        <div class="sub" id="splash-sub">
          <div class="sub-tourney" id="splash-tourney" hidden></div>
          <div class="sub-battle-format" id="splash-format" hidden></div>
          <div class="sub-vs" id="splash-vs" hidden></div>
        </div>
      </div>
    </div>

    <audio
      id="victory-sfx"
      preload="auto"
      playsinline
      style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none"
    >
      <source src="/static/audio/victory.mp3" type="audio/mpeg" />
    </audio>
    <audio
      id="tournament-victory-sfx"
      preload="auto"
      playsinline
      loop
      style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none"
    >
      <source src="/static/audio/tournament_victory.mp3" type="audio/mpeg" />
    </audio>

    <script src="/static/vendor/confetti.min.js?v={{ cache_bust }}"></script>
    <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
    <script>
      var $splash = document.getElementById("splash");
      var $label = document.getElementById("splash-label");
      var $portrait = document.getElementById("splash-portrait");
      var $name = document.getElementById("splash-name");
      var $sub = document.getElementById("splash-sub");
      var $splashFmt = document.getElementById("splash-format");
      var $splashTourney = document.getElementById("splash-tourney");
      var $splashVs = document.getElementById("splash-vs");
      var $victorySfx = document.getElementById("victory-sfx");
      var $tournamentVictorySfx = document.getElementById("tournament-victory-sfx");

      function primeAudioForAutoplay(el) {
        if (!el) return;
        el.muted = true;
        var p = el.play();
        if (p && typeof p.then === "function") {
          p.then(function () {
            el.pause();
            el.currentTime = 0;
            el.muted = false;
          }).catch(function () {
            el.muted = false;
          });
        } else {
          el.pause();
          el.currentTime = 0;
          el.muted = false;
        }
      }

      window.addEventListener("message", function (evt) {
        var d = evt && evt.data;
        if (!d || d.type !== "user_gesture_unlock") return;
        primeAudioForAutoplay($victorySfx);
        primeAudioForAutoplay($tournamentVictorySfx);
      });

      var victoryVisibleMs = parseInt(
        document.body.getAttribute("data-victory-visible-ms") || "30000",
        10
      );
      if (!Number.isFinite(victoryVisibleMs) || victoryVisibleMs < 1) {
        victoryVisibleMs = 30000;
      }

      var tournamentVictoryVisibleMs = parseInt(
        document.body.getAttribute("data-tournament-victory-visible-ms") || "60000",
        10
      );
      if (
        !Number.isFinite(tournamentVictoryVisibleMs) ||
        tournamentVictoryVisibleMs < 1
      ) {
        tournamentVictoryVisibleMs = 60000;
      }

      var victoryShowDelayMs = parseInt(
        document.body.getAttribute("data-victory-show-delay-ms") || "1000",
        10
      );
      if (!Number.isFinite(victoryShowDelayMs) || victoryShowDelayMs < 0) {
        victoryShowDelayMs = 1000;
      }

      // Last completed match (id + timestamp) plus a total_matches cursor. The
      // fingerprint alone misses: iframe reload (state reset), first hub tick
      // with the new last_match only (primed without splash), or rare races
      // between SQLite and the scoreboard row.
      var CELEBRATED_TOTAL_KEY = "pokemon_showdown_victory_celebrated_total";
      var lastMatchFingerprint = null;
      var celebratedTotalMemory = null;
      var hideTimer = null;
      var showDelayTimer = null;

      function readCelebratedTotalStored() {
        try {
          var s = sessionStorage.getItem(CELEBRATED_TOTAL_KEY);
          if (s === null || s === "") return null;
          var n = parseInt(s, 10);
          return Number.isNaN(n) ? null : n;
        } catch (_e) {
          return null;
        }
      }

      function writeCelebratedTotalStored(n) {
        try {
          sessionStorage.setItem(CELEBRATED_TOTAL_KEY, String(n));
        } catch (_e) {}
      }

      function syncCelebratedCursor(tm) {
        var stored = readCelebratedTotalStored();
        if (stored !== null) {
          celebratedTotalMemory = stored;
        } else if (celebratedTotalMemory === null) {
          celebratedTotalMemory = tm;
          writeCelebratedTotalStored(tm);
        }
        if (tm < celebratedTotalMemory) {
          celebratedTotalMemory = tm;
          writeCelebratedTotalStored(tm);
        }
        return celebratedTotalMemory;
      }

      function advanceCelebratedCursor(tm) {
        celebratedTotalMemory = tm;
        writeCelebratedTotalStored(tm);
      }

      function fingerprintLastMatch(m) {
        if (!m || m.id == null) return "";
        var ts = m.timestamp != null ? m.timestamp : "";
        return String(m.id) + ":" + String(ts);
      }

      function stopVictorySfx() {
        if ($victorySfx) {
          $victorySfx.pause();
          $victorySfx.currentTime = 0;
        }
        if ($tournamentVictorySfx) {
          $tournamentVictorySfx.pause();
          $tournamentVictorySfx.currentTime = 0;
          $tournamentVictorySfx.loop = false;
        }
      }

      function playVictorySfx(isTournamentChamp) {
        if (isTournamentChamp && $tournamentVictorySfx) {
          if ($victorySfx) {
            $victorySfx.pause();
            $victorySfx.currentTime = 0;
          }
          $tournamentVictorySfx.loop = true;
          $tournamentVictorySfx.currentTime = 0;
          var pt = $tournamentVictorySfx.play();
          if (pt && typeof pt.catch === "function") {
            pt.catch(function () {});
          }
          return;
        }
        if ($tournamentVictorySfx) {
          $tournamentVictorySfx.pause();
          $tournamentVictorySfx.currentTime = 0;
          $tournamentVictorySfx.loop = false;
        }
        if (!$victorySfx) return;
        $victorySfx.currentTime = 0;
        var p = $victorySfx.play();
        if (p && typeof p.catch === "function") {
          p.catch(function () {});
        }
      }

      function resetBursts() {
        var root = $splash;
        var bursts = root.querySelectorAll(".burst");
        bursts.forEach(function (el) {
          var clone = el.cloneNode(true);
          el.parentNode.replaceChild(clone, el);
        });
      }

      function runTournamentConfetti() {
        if (typeof confetti !== "function") return;
        var w = window.innerWidth || 1280;
        var h = window.innerHeight || 720;
        var positions = [
          { x: w * 0.5, y: h * 0.36 },
          { x: w * 0.2, y: h * 0.26 },
          { x: w * 0.8, y: h * 0.26 },
          { x: w * 0.34, y: h * 0.5 },
          { x: w * 0.66, y: h * 0.5 },
        ];
        positions.forEach(function (pos, i) {
          setTimeout(function () {
            confetti({
              position: pos,
              count: 100,
              size: 1.15,
              velocity: 240,
              fade: true,
            });
          }, i * 180);
        });
      }

      function showVictory(match, p1, p2, p1Portrait, p2Portrait, p1Sprite, p2Sprite) {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        if (showDelayTimer) {
          clearTimeout(showDelayTimer);
          showDelayTimer = null;
        }
        stopVictorySfx();

        var winner = (match && match.winner) || "Unknown";
        var isDraw = winner === "Draw";

        function pickArt(portrait, sprite) {
          var a = (portrait || "").trim();
          if (a) return a;
          return (sprite || "").trim();
        }

        var artUrl = "";
        if (!isDraw) {
          if (winner === p1) artUrl = pickArt(p1Portrait, p1Sprite);
          else if (winner === p2) artUrl = pickArt(p2Portrait, p2Sprite);
        }
        $portrait.classList.remove("is-visible");
        $portrait.onload = null;
        $portrait.onerror = null;
        if (artUrl) {
          $portrait.alt = winner + " portrait";
          $portrait.removeAttribute("width");
          $portrait.removeAttribute("height");
          $portrait.onload = function () {
            $portrait.classList.add("is-visible");
          };
          $portrait.onerror = function () {
            $portrait.classList.remove("is-visible");
            $portrait.removeAttribute("src");
          };
          if ($portrait.getAttribute("src") === artUrl) {
            $portrait.removeAttribute("src");
            void $portrait.offsetWidth;
          }
          $portrait.src = artUrl;
        } else {
          $portrait.alt = "";
          $portrait.removeAttribute("src");
        }

        var isTournamentChamp =
          !isDraw && match && match.victory_tournament_clinched;
        var victoryDisplayMs = isTournamentChamp
          ? tournamentVictoryVisibleMs
          : victoryVisibleMs;
        $label.textContent = victorySplashTitleLabel(match, isDraw);
        $label.className = "label" + (isTournamentChamp ? " tournament-champ" : "");
        $name.className = "winner-name";
        if (isDraw) {
          $name.classList.add("draw");
        } else if (isTournamentChamp) {
          $name.classList.add("tournament-champ");
        } else if (winner === p1) {
          $name.classList.add("p1");
        } else if (winner === p2) {
          $name.classList.add("p2");
        }
        $name.textContent = winner;

        var fmtLine = "";
        if (match && match.battle_format) {
          var fmt = displayBattleFormat(match.battle_format);
          if (fmt && fmt !== "--") fmtLine = fmt;
        }
        if (fmtLine && $splashFmt) {
          $splashFmt.textContent = fmtLine;
          $splashFmt.hidden = false;
        } else if ($splashFmt) {
          $splashFmt.textContent = "";
          $splashFmt.hidden = true;
        }

        var tourneyLine = match ? formatTournamentMatchContextLine(match) : "";
        if (tourneyLine && $splashTourney) {
          $splashTourney.textContent = tourneyLine;
          $splashTourney.hidden = false;
        } else if ($splashTourney) {
          $splashTourney.textContent = "";
          $splashTourney.hidden = true;
        }

        if (p1 && p2 && $splashVs) {
          $splashVs.textContent = p1 + " vs " + p2;
          $splashVs.hidden = false;
        } else if ($splashVs) {
          $splashVs.textContent = "";
          $splashVs.hidden = true;
        }

        if ($sub) {
          var anyMeta =
            ($splashFmt && !$splashFmt.hidden) ||
            ($splashTourney && !$splashTourney.hidden) ||
            ($splashVs && !$splashVs.hidden);
          $sub.style.display = anyMeta ? "" : "none";
        }

        showDelayTimer = setTimeout(function () {
          showDelayTimer = null;
          $splash.classList.remove("fading");
          resetBursts();
          void $splash.offsetWidth;
          $splash.classList.add("visible");
          playVictorySfx(isTournamentChamp);
          if (
            match &&
            match.victory_tournament_clinched &&
            (match.winner || "") !== "Draw"
          ) {
            runTournamentConfetti();
          }

          hideTimer = setTimeout(function () {
            stopVictorySfx();
            $splash.classList.add("fading");
            hideTimer = setTimeout(function () {
              $splash.classList.remove("visible", "fading");
              hideTimer = null;
            }, 500);
          }, victoryDisplayMs);
        }, victoryShowDelayMs);
      }

      var useBroadcastHub = /\bembed=broadcast\b/.test(
        location.search || "",
      );

      function hideVictorySplashImmediately() {
        if (showDelayTimer) {
          clearTimeout(showDelayTimer);
          showDelayTimer = null;
        }
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        stopVictorySfx();
        if ($splash) {
          $splash.classList.remove("visible", "fading");
        }
      }

      function victorySplashPendingOrVisible() {
        if (showDelayTimer != null || hideTimer != null) return true;
        return $splash && $splash.classList.contains("visible");
      }

      function processScoreboardData(data) {
        if (!data) return;
        var st = data.battle_status || "idle";
        var p1 = data.player1_name || "Player 1";
        var p2 = data.player2_name || "Player 2";
        var lm = data.last_match;
        var fp = fingerprintLastMatch(lm);
        var tm = Number(data.total_matches) || 0;
        var celebrated = syncCelebratedCursor(tm);
        var newByTotal = tm > celebrated;
        var newByFingerprint =
          Boolean(fp) &&
          lastMatchFingerprint !== null &&
          fp !== lastMatchFingerprint;

        if (newByTotal || newByFingerprint) {
          advanceCelebratedCursor(tm);
          if (fp) {
            lastMatchFingerprint = fp;
          }
          if (lm) {
            var vP1 = (lm && lm.player1_name) || p1;
            var vP2 = (lm && lm.player2_name) || p2;
            var vP1portrait =
              (lm && lm.player1_portrait_square_url) ||
              data.player1_portrait_square_url ||
              "";
            var vP2portrait =
              (lm && lm.player2_portrait_square_url) ||
              data.player2_portrait_square_url ||
              "";
            var vP1sprite = (lm && lm.player1_sprite_url) || "";
            var vP2sprite = (lm && lm.player2_sprite_url) || "";
            showVictory(lm, vP1, vP2, vP1portrait, vP2portrait, vP1sprite, vP2sprite);
          }
        } else if (lastMatchFingerprint === null && fp) {
          lastMatchFingerprint = fp;
        }

        if (
          st === "tournament_intro" ||
          st === "intro_gap" ||
          st === "starting" ||
          st === "live"
        ) {
          if (!victorySplashPendingOrVisible()) {
            hideVictorySplashImmediately();
          }
        }
      }

      async function tickFromFetch() {
        try {
          var resp = await fetch("/scoreboard", { cache: "no-store" });
          if (!resp.ok) return;
          var data = await resp.json();
          processScoreboardData(data);
        } catch (err) {
          console.warn("[victory] scoreboard poll failed:", err);
        }
      }

      function onHubScoreboardMessage(ev) {
        if (ev.origin !== window.location.origin) return;
        var d = ev.data;
        if (!d || d.type !== "scoreboard" || !d.payload) return;
        processScoreboardData(d.payload);
      }

      if (useBroadcastHub) {
        window.addEventListener("message", onHubScoreboardMessage);
      } else {
        tickFromFetch();
        setInterval(tickFromFetch, 400);
      }
    </script>
  </body>
</html>
