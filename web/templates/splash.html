        min-height: 0;
      }
      .bracket-following-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        color: rgba(160, 235, 200, 0.55);
        margin: 22px auto 8px;
        max-width: 920px;
        text-align: left;
      }
      .bi-bracket-section-title {
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(175, 240, 210, 0.88);
        margin-bottom: 8px;
        text-align: left;
      }
      .bi-bracket-inner {
        overflow: visible;
      }
      .bi-bracket {
        display: flex;
        align-items: stretch;
        gap: 20px;
        flex-wrap: nowrap;
      }
      .bi-bracket-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 132px;
        flex: 0 0 auto;
      }
      .bi-bracket-col-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(180, 230, 210, 0.62);
        margin-bottom: 6px;
        flex-shrink: 0;
        text-align: center;
        line-height: 1.25;
        width: 100%;
        max-width: 260px;
        box-sizing: border-box;
      }
      .bi-bracket-matches {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        justify-content: center;
        width: 100%;
        max-width: 260px;
        align-items: stretch;
        box-sizing: border-box;
      }
      .bi-match {
        border: 1px solid rgba(120, 200, 170, 0.35);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(0, 24, 20, 0.42);
        max-width: 260px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(2.75ch, max-content);
        column-gap: 8px;
        row-gap: 4px;
        align-items: center;
        padding: 4px 9px;
        box-sizing: border-box;
      }
      .bi-match--done {
        border-color: rgba(60, 200, 120, 0.5);
      }
      .bi-match--live {
        border-color: rgba(120, 160, 255, 0.55);
        background: rgba(40, 50, 90, 0.22);
      }
      .bi-match--next {
        box-shadow:
          0 0 0 2px rgba(120, 175, 255, 0.92),
          0 0 26px rgba(90, 140, 255, 0.38);
        border-color: rgba(140, 185, 255, 0.88);
        background: rgba(22, 36, 68, 0.42);
      }
      .bi-player {
        display: contents;
        font-size: 14px;
        line-height: 1.25;
      }
      .bi-match > .bi-player-name,
      .bi-match > .bi-score {
        padding: 5px 0;
      }
      .bi-match > span:nth-child(1),
      .bi-match > span:nth-child(2) {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .bi-player-name {
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: left;
      }
      .bi-player--winner .bi-player-name {
        color: #b4ffd9;
        font-weight: 700;
      }
      .bi-score {
        font-weight: 800;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.88);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .bi-standings-wrap {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
      }
      .bi-standings {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .bi-standings th,
      .bi-standings td {
        padding: 6px 10px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .bi-standings th {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(170, 220, 200, 0.65);
      }
      .bi-std-name {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.92);
      }
      .bi-std-w {
        color: #a8f5d0;
        font-weight: 700;
      }
      .bi-std-muted {
        color: rgba(200, 230, 220, 0.55);
      }
      .bracket-list {
        list-style: none;
        text-align: left;
        max-width: 920px;
        margin: 0 auto;
        padding: 0;
        max-height: 200px;
        overflow-y: auto;
        font-size: 16px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.88);
      }
      .bracket-list li {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .bracket-list li:last-child { border-bottom: 0; }

        </style>
        <script src="/static/vendor/confetti.min.js?v={{ cache_bust }}"></script>
        <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
        <script src="/static/broadcast-bracket-interstitial.js?v={{ cache_bust }}"></script>
        <script src="/static/scoreboard-stream-client.js?v={{ cache_bust }}"></script>
    </head>
    <body data-victory-visible-ms="{{ victory_modal_ms }}"
          data-tournament-victory-visible-ms="{{ tournament_victory_modal_ms }}"
          data-victory-show-delay-ms="{{ victory_show_delay_ms }}"
          data-match-intro-ms="{{ match_intro_ms }}"
          data-bracket-ms="{{ bracket_interstitial_ms }}">
        <div id="tintro-splash" aria-live="polite">
            <div class="tintro-burst"></div>
            <div class="tintro-burst"></div>
            <div class="tintro-burst"></div>
            <div class="tintro-card">
                <div class="tintro-label">Tournament</div>
                <div class="tintro-name" id="tintro-title">—</div>
                <div class="tintro-meta" id="tintro-meta"></div>
                <div class="tintro-format" id="tintro-format" hidden></div>
                <div class="tintro-roster-wrap">
                    <div class="tintro-roster-caption">Participants</div>
                    <div class="tintro-roster" id="tintro-roster"></div>
                </div>
            </div>
        </div>
        <div id="intro-splash" aria-live="polite">
            <div class="intro-burst"></div>
            <div class="intro-burst"></div>
            <div class="intro-burst"></div>
            <div class="intro-card">
                <div class="intro-label">Matchup</div>
                <div class="intro-matchup">
                    <div class="intro-side p1">
                        <img class="intro-portrait" id="intro-portrait-p1" alt="" />
                        <div class="intro-name p1" id="intro-name-p1">Player 1</div>
                    </div>
                    <div class="intro-vs">VS</div>
                    <div class="intro-side p2">
                        <img class="intro-portrait" id="intro-portrait-p2" alt="" />
                        <div class="intro-name p2" id="intro-name-p2">Player 2</div>
                    </div>
                </div>
                <div class="intro-sub">
                    <div class="intro-format" id="intro-format" hidden></div>
                    <div class="intro-tourney" id="intro-tourney" hidden></div>
                </div>
            </div>
        </div>
        <div id="bracket-splash" aria-live="polite">
            <div class="bracket-burst"></div>
            <div class="bracket-burst"></div>
            <div class="bracket-burst"></div>
            <div class="bracket-card">
                <div class="bracket-label">Bracket · Up next</div>
                <div class="bracket-next-line" id="bracket-next-line" hidden></div>
                <div class="bracket-visual-wrap" id="bracket-visual-wrap" hidden>
                    <div class="bracket-visual" id="bracket-visual"></div>
                </div>
                <div class="bracket-following-label" id="bracket-following-label" hidden>Then</div>
                <ul class="bracket-list" id="bracket-list">
                </ul>
            </div>
        </div>
        <div id="splash" aria-live="polite">
            <div class="burst"></div>
            <div class="burst"></div>
            <div class="burst"></div>
            <div class="card">
                <div class="label" id="splash-label">Winner</div>
                <img class="winner-portrait" id="splash-portrait" alt="" />
                <div class="winner-name" id="splash-name"></div>
                <div class="sub" id="splash-sub">
                    <div class="sub-tourney" id="splash-tourney" hidden></div>
                    <div class="sub-battle-format" id="splash-format" hidden></div>
                    <div class="sub-vs" id="splash-vs" hidden></div>
                </div>
            </div>
        </div>
        <audio id="victory-sfx"
               preload="auto"
               playsinline
               style="position: absolute;
                      width: 0;
                      height: 0;
                      opacity: 0;
                      pointer-events: none">
            <source src="/static/audio/victory.mp3" type="audio/mpeg" />
        </audio>
        <audio id="tournament-victory-sfx"
               preload="auto"
               playsinline
               loop
               style="position: absolute;
                      width: 0;
                      height: 0;
                      opacity: 0;
                      pointer-events: none">
            <source src="/static/audio/tournament_victory.mp3" type="audio/mpeg" />
        </audio>
        <script src="/static/broadcast-splashes.js?v={{ cache_bust }}"></script>
