<!DOCTYPE html>
<html lang="en" class="broadcast-page broadcast-page--hub">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=1280,height=720" />
        <title>{{ stream_title }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Teko:wght@500;600&display=swap"
              rel="stylesheet" />
        <link rel="stylesheet"
              href="/static/broadcast-tokens.css?v={{ cache_bust }}" />
        <link rel="stylesheet"
              href="/static/broadcast-top-bar.css?v={{ cache_bust }}" />
        <link rel="stylesheet" href="/static/broadcast-hub.css?v={{ cache_bust }}" />
        <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
    </head>
    <body class="broadcast-page broadcast-page--hub">
        <div class="scene">
            {% include "partials/broadcast_top_bar_strip.html" %}
            <iframe class="battle-frame"
                    id="battle-frame"
                    src="{{ showdown_internal_url }}"
                    title="Pokémon Showdown"
                    allow="autoplay; fullscreen"
                    allowfullscreen>
            </iframe>
            <iframe class="overlay-frame"
                    id="overlay-frame"
                    src="/overlay?embed=broadcast"
                    title="Scoreboard Overlay">
            </iframe>
            <div class="splash-stack">
                <iframe class="broadcast-splashes-frame"
                        id="broadcast-splashes-frame"
                        src="/victory?embed=broadcast"
                        title="Tournament intro, victory, bracket, matchup"
                        allow="autoplay"></iframe>
            </div>
            <div class="thoughts-wrap">
                <section class="thoughts-panel">
                    <div class="thoughts-panel-head">
                        <div class="thoughts-title red" id="thoughts-title-p1">Player 1</div>
                    </div>
                    <div class="thoughts-scroll">
                        <img class="thoughts-portrait" id="thoughts-portrait-p1" alt="" />
                        <div class="thoughts-scroll-body" id="thoughts-p1"></div>
                    </div>
                </section>
                <section class="thoughts-panel">
                    <div class="thoughts-panel-head">
                        <div class="thoughts-title blue" id="thoughts-title-p2">Player 2</div>
                    </div>
                    <div class="thoughts-scroll">
                        <img class="thoughts-portrait" id="thoughts-portrait-p2" alt="" />
                        <div class="thoughts-scroll-body" id="thoughts-p2"></div>
                    </div>
                </section>
            </div>
        </div>
        <script>
      window.__BROADCAST_SCOREBOARD_HUB__ = true;
      window.__BATTLE_CORE__ = {
        battleFrameId: "battle-frame",
        formatLabelId: "battle-format-label",
        tournamentLabelId: "broadcast-tournament-label",
        internalUrl: "{{ showdown_internal_url }}",
        localUrl: "{{ showdown_local_url }}",
      };
      window.__THOUGHTS_FEED__ = {
        hideBattleUi: {{ hide_battle_ui | tojson }},
        syncHeightsIframeId: "battle-frame",
        panels: {
          p1: "thoughts-p1",
          p2: "thoughts-p2",
          titleP1: "thoughts-title-p1",
          titleP2: "thoughts-title-p2",
          portraitP1: "thoughts-portrait-p1",
          portraitP2: "thoughts-portrait-p2",
        },
        calloutIframeId: "battle-frame",
      };
        </script>
        <!-- #region agent log -->
        <script>
    window._dbg=function(l,m,d,h){var b=JSON.stringify({sessionId:'777ae1',location:l,message:m,data:d||{},timestamp:Date.now(),hypothesisId:h||''});var hd={'Content-Type':'application/json','X-Debug-Session-Id':'777ae1'};fetch('http://host.docker.internal:7539/ingest/0cfba3e1-d9cf-4e0c-a763-b4412d1375b9',{method:'POST',headers:hd,body:b}).catch(function(){fetch('http://127.0.0.1:7539/ingest/0cfba3e1-d9cf-4e0c-a763-b4412d1375b9',{method:'POST',headers:hd,body:b}).catch(function(){});});};
    window._dbg('broadcast:init','page loaded',{ua:navigator.userAgent},'H1');
    (function(){var seq=0,last=Date.now();setInterval(function(){var now=Date.now(),d=now-last;seq++;var mem=performance.memory?{used:performance.memory.usedJSHeapSize,total:performance.memory.totalJSHeapSize,limit:performance.memory.jsHeapSizeLimit}:null;if(d>10000||seq%6===0)window._dbg('broadcast:heartbeat','hb',{seq:seq,delta_ms:d,mem:mem},'H1');last=now;},5000);})();
        </script>
        <!-- #endregion -->
        <script>
      (function () {
        function postAudioUnlock() {
          var bf = document.getElementById("battle-frame");
          if (bf && bf.contentWindow) {
            try {
              bf.contentWindow.postMessage({ type: "user_gesture_unlock" }, "*");
            } catch (_e) {}
          }
          var vf = document.getElementById("broadcast-splashes-frame");
          if (vf && vf.contentWindow) {
            try {
              vf.contentWindow.postMessage({ type: "user_gesture_unlock" }, "*");
            } catch (_e) {}
          }
        }
        function runUnlock() {
          postAudioUnlock();
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", runUnlock);
        } else {
          runUnlock();
        }
        window.addEventListener("load", runUnlock);
        setTimeout(runUnlock, 300);
        setTimeout(runUnlock, 1200);
      })();
        </script>
        <script src="/static/broadcast-battle-core.js?v={{ cache_bust }}"></script>
        <script src="/static/broadcast-thoughts-feed.js?v={{ cache_bust }}"></script>
        <script src="/static/scoreboard-stream-client.js?v={{ cache_bust }}"></script>
        <script>
      (function () {
        var origin = window.location.origin || "*";
        var lastSeq = 0;
        function pushScoreboardToEmbeds(data, seq) {
          try {
            window.dispatchEvent(new CustomEvent("broadcast_scoreboard", { detail: data }));
          } catch (_e) {}
          var msg = { type: "scoreboard", payload: data };
          if (typeof seq === "number") msg.seq = seq;
          ["overlay-frame", "broadcast-splashes-frame"].forEach(function (id) {
            var el = document.getElementById(id);
            if (!el || !el.contentWindow) return;
            try {
              el.contentWindow.postMessage(msg, origin);
            } catch (_e) {}
          });
        }
        function refreshBattleFromHub(data) {
          try {
            if (typeof window.__refreshBattleFromHubScoreboard__ === "function") {
              window.__refreshBattleFromHubScoreboard__(data);
            }
          } catch (_e) {}
        }
        var lastPayload = null;
        window.attachScoreboardStream({
          getSeq: function () {
            return lastSeq;
          },
          setSeq: function (n) {
            lastSeq = n;
          },
          applyOrdered: function (payload) {
            lastPayload = payload;
            pushScoreboardToEmbeds(payload, lastSeq);
            refreshBattleFromHub(payload);
          },
          applyFallback: function (payload) {
            lastPayload = payload;
            pushScoreboardToEmbeds(payload);
            refreshBattleFromHub(payload);
          },
        });
        setTimeout(function () {
          if (lastPayload) pushScoreboardToEmbeds(lastPayload, lastSeq);
        }, 2000);
      })();
        </script>
    </body>
</html>
