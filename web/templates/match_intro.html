<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Match intro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff;
      }

      #intro-splash {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #intro-splash.visible {
        opacity: 1;
      }

      #intro-splash.fading {
        opacity: 0;
      }

      .intro-burst {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid rgba(120, 200, 255, 0.35);
        animation: intro-ring 1s ease-out forwards;
      }

      .intro-burst:nth-child(2) {
        animation-delay: 0.07s;
      }
      .intro-burst:nth-child(3) {
        animation-delay: 0.14s;
      }

      @keyframes intro-ring {
        0% {
          transform: scale(0.15);
          opacity: 1;
        }
        100% {
          transform: scale(12);
          opacity: 0;
        }
      }

      .intro-card {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 26px 40px 30px;
        min-width: 720px;
        max-width: 1080px;
        background: radial-gradient(
          ellipse at center,
          rgba(18, 26, 48, 0.94) 0%,
          rgba(8, 12, 28, 0.9) 72%,
          rgba(0, 0, 0, 0.78) 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        box-shadow:
          0 0 50px rgba(80, 140, 255, 0.22),
          0 22px 44px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(14px);
        transform: scale(0.72);
        opacity: 0;
      }

      #intro-splash.visible .intro-card {
        animation: intro-card-in 0.7s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
      }

      @keyframes intro-card-in {
        0% {
          transform: scale(0.72);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      #intro-splash.fading .intro-card {
        animation: intro-card-out 0.48s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      }

      @keyframes intro-card-out {
        0% {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
        100% {
          transform: scale(0.9) translateY(22px);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #intro-splash {
          transition: opacity 0.2s ease;
        }
        #intro-splash.fading .intro-card {
          animation: none;
          opacity: 0;
          transform: scale(1);
        }
      }

      .intro-label {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: rgba(180, 210, 255, 0.65);
        margin-bottom: 18px;
        font-weight: 700;
      }

      .intro-matchup {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 28px;
        margin-bottom: 18px;
      }

      .intro-side {
        flex: 1;
        min-width: 0;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        opacity: 0;
        transform: translateX(0);
      }

      #intro-splash.visible .intro-side.p1 {
        animation: intro-slide-in-left 0.55s ease 0.12s forwards;
      }

      #intro-splash.visible .intro-side.p2 {
        animation: intro-slide-in-right 0.55s ease 0.12s forwards;
      }

      @keyframes intro-slide-in-left {
        0% {
          opacity: 0;
          transform: translateX(-36px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes intro-slide-in-right {
        0% {
          opacity: 0;
          transform: translateX(36px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .intro-portrait {
        width: 120px;
        height: 120px;
        border-radius: 16px;
        object-fit: cover;
        object-position: center top;
        border: 2px solid rgba(255, 255, 255, 0.28);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
        background: rgba(0, 0, 0, 0.35);
        flex-shrink: 0;
      }

      .intro-side.p1 .intro-portrait {
        box-shadow:
          0 0 24px rgba(255, 107, 107, 0.25),
          0 10px 28px rgba(0, 0, 0, 0.55);
      }

      .intro-side.p2 .intro-portrait {
        box-shadow:
          0 0 24px rgba(116, 185, 255, 0.25),
          0 10px 28px rgba(0, 0, 0, 0.55);
      }

      .intro-name {
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .intro-name.p1 {
        color: #ffb0ae;
        text-shadow: 0 0 28px rgba(255, 107, 107, 0.45);
      }

      .intro-name.p2 {
        color: #a8d4ff;
        text-shadow: 0 0 28px rgba(116, 185, 255, 0.45);
      }

      .intro-vs {
        flex-shrink: 0;
        font-size: 38px;
        font-weight: 900;
        font-style: italic;
        letter-spacing: 0.06em;
        background: linear-gradient(
          135deg,
          #fff6d4 0%,
          #ffd43b 38%,
          #fab005 62%,
          #ffe066 100%
        );
        background-size: 180% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: intro-vs-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both,
          intro-shine 2.2s linear infinite;
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.65));
      }

      @keyframes intro-vs-pop {
        0% {
          transform: scale(0.3);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes intro-shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 180% center;
        }
      }

      .intro-sub {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
      }

      .intro-format {
        font-size: 15px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.82);
        letter-spacing: 0.03em;
      }

      .intro-tourney {
        font-size: 13px;
        font-weight: 600;
        color: rgba(200, 220, 255, 0.88);
        letter-spacing: 0.04em;
        max-width: 900px;
        line-height: 1.35;
        text-align: center;
      }

      .intro-tourney[hidden],
      .intro-format[hidden] {
        display: none !important;
      }
    </style>
    <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
  </head>
  <body data-match-intro-ms="{{ match_intro_ms }}">
    <div id="intro-splash" aria-live="polite">
      <div class="intro-burst"></div>
      <div class="intro-burst"></div>
      <div class="intro-burst"></div>
      <div class="intro-card">
        <div class="intro-label">Matchup</div>
        <div class="intro-matchup">
          <div class="intro-side p1">
            <img class="intro-portrait" id="intro-portrait-p1" alt="" />
            <div class="intro-name p1" id="intro-name-p1">Player 1</div>
          </div>
          <div class="intro-vs">VS</div>
          <div class="intro-side p2">
            <img class="intro-portrait" id="intro-portrait-p2" alt="" />
            <div class="intro-name p2" id="intro-name-p2">Player 2</div>
          </div>
        </div>
        <div class="intro-sub">
          <div class="intro-format" id="intro-format" hidden></div>
          <div class="intro-tourney" id="intro-tourney" hidden></div>
        </div>
      </div>
    </div>

    <script>
      var $splash = document.getElementById("intro-splash");
      var $p1img = document.getElementById("intro-portrait-p1");
      var $p2img = document.getElementById("intro-portrait-p2");
      var $p1name = document.getElementById("intro-name-p1");
      var $p2name = document.getElementById("intro-name-p2");
      var $fmt = document.getElementById("intro-format");
      var $tourney = document.getElementById("intro-tourney");

      var introMs = parseInt(
        document.body.getAttribute("data-match-intro-ms") || "0",
        10
      );
      if (!Number.isFinite(introMs)) introMs = 0;

      var hideTimer = null;
      var burstTimer = null;
      var INTRO_SHOWN_SS_KEY = "pokemon_llm_match_intro_shown_v1";
      /* Allow late "live" ticks (throttled tab / missed "starting") without skipping intro */
      var LIVE_INTRO_MAX_AGE_SEC = 180;
      /* After a starting intro, suppress duplicate live intro for the same manager match */
      var RECENT_STARTING_INTRO_MS = 20000;
      var introShownMem = {};
      var recentStartingIntroByMatch = {};

      function introShownMap() {
        try {
          var raw = sessionStorage.getItem(INTRO_SHOWN_SS_KEY);
          var o = raw ? JSON.parse(raw) : {};
          return o && typeof o === "object" ? o : {};
        } catch (e) {
          return {};
        }
      }

      /**
       * Scope intro dedupe to a tournament so resetting manager DB (match ids 1,2,…
       * reused) does not suppress intros via stale sessionStorage from an older t{id}.
       */
      function introDedupeScopePrefix(d) {
        if (!d) return "";
        var tc = d.tournament_context || {};
        var tid = tc.tournament_id;
        if (tid != null && String(tid).trim() !== "") {
          return "t" + String(tid) + ":";
        }
        return "";
      }

      function recentStartingIntroKey(d) {
        if (!d || d.match_id == null || String(d.match_id) === "") return "";
        return introDedupeScopePrefix(d) + "m:" + String(d.match_id);
      }

      function matchIntroDedupeKey(d) {
        if (!d) return "";
        var scope = introDedupeScopePrefix(d);
        if (d.match_id != null && String(d.match_id) !== "")
          return scope + "m:" + String(d.match_id);
        var p1 = String(d.player1_name || "");
        var p2 = String(d.player2_name || "");
        var fmt = String(d.battle_format || "");
        if (!p1 && !p2) return "";
        var tc = d.tournament_context || {};
        var gn = tc.game_number != null ? String(tc.game_number) : "";
        var gPart = gn ? "|g" + gn : "";
        return scope + "nomid:" + p1 + "|" + p2 + "|" + fmt + gPart;
      }

      function introDedupeKeyFromBattleTag(d) {
        if (!d || d.battle_tag == null) return "";
        var t = String(d.battle_tag).trim();
        if (!t) return "";
        var scope = introDedupeScopePrefix(d);
        return scope + "bt:" + t.replace(/^>+/, "").trim();
      }

      function persistBattleTagDedupe(btKey) {
        if (!btKey) return;
        introShownMem[btKey] = 1;
        try {
          var map = introShownMap();
          map[btKey] = 1;
          var keys = Object.keys(map);
          if (keys.length > 100) {
            keys.sort();
            for (var i = 0; i < keys.length - 60; i++) delete map[keys[i]];
          }
          sessionStorage.setItem(INTRO_SHOWN_SS_KEY, JSON.stringify(map));
        } catch (e) {}
      }

      function introWasShownFor(d) {
        if (!d) return false;
        var st = d.battle_status || "idle";
        var btKey = introDedupeKeyFromBattleTag(d);
        if (st === "live" && btKey) {
          if (introShownMem[btKey] || introShownMap()[btKey]) return true;
          var rsKey = recentStartingIntroKey(d);
          var t0 = rsKey ? recentStartingIntroByMatch[rsKey] : 0;
          if (t0 && Date.now() - t0 < RECENT_STARTING_INTRO_MS) {
            persistBattleTagDedupe(btKey);
            return true;
          }
          return false;
        }
        var k = matchIntroDedupeKey(d);
        if (!k) return false;
        if (introShownMem[k]) return true;
        return !!introShownMap()[k];
      }

      function markIntroShownFor(d) {
        if (!d) return;
        if (d.battle_status === "starting" && d.match_id != null) {
          var rsKey = recentStartingIntroKey(d);
          if (rsKey)
            recentStartingIntroByMatch[rsKey] = Date.now();
        }
        var btKey = introDedupeKeyFromBattleTag(d);
        var k = matchIntroDedupeKey(d);
        if (!btKey && !k) return;
        if (btKey) introShownMem[btKey] = 1;
        if (k) introShownMem[k] = 1;
        try {
          var map = introShownMap();
          if (btKey) map[btKey] = 1;
          if (k) map[k] = 1;
          var keys = Object.keys(map);
          if (keys.length > 100) {
            keys.sort();
            for (var i = 0; i < keys.length - 60; i++) delete map[keys[i]];
          }
          sessionStorage.setItem(INTRO_SHOWN_SS_KEY, JSON.stringify(map));
        } catch (e) {}
      }

      /** Tournament intro / gap reuse the same manager match_id as the upcoming matchup;
       * sessionStorage from an earlier run (same tournament + id) must not block the card. */
      function clearMatchIntroDedupeForManagerMatch(d) {
        if (!d) return;
        var k = matchIntroDedupeKey(d);
        if (!k) return;
        delete introShownMem[k];
        var rsKey = recentStartingIntroKey(d);
        if (rsKey) delete recentStartingIntroByMatch[rsKey];
        try {
          var map = introShownMap();
          if (map[k]) {
            delete map[k];
            sessionStorage.setItem(INTRO_SHOWN_SS_KEY, JSON.stringify(map));
          }
        } catch (e) {}
      }

      function liveBattleFreshEnoughForIntro(d) {
        var u = d.battle_updated_at;
        if (u == null) return false;
        var t =
          typeof u === "number" ? u : parseFloat(String(u), 10);
        if (!Number.isFinite(t)) return false;
        return Date.now() / 1000 - t < LIVE_INTRO_MAX_AGE_SEC;
      }

      function resetIntroBursts() {
        var root = $splash;
        if (!root) return;
        var bursts = root.querySelectorAll(".intro-burst");
        bursts.forEach(function (el) {
          var clone = el.cloneNode(true);
          el.parentNode.replaceChild(clone, el);
        });
      }

      function hideSplash() {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        if (burstTimer) {
          clearTimeout(burstTimer);
          burstTimer = null;
        }
        $splash.classList.remove("visible");
        $splash.classList.add("fading");
        hideTimer = setTimeout(function () {
          $splash.classList.remove("fading");
          hideTimer = null;
        }, 600);
      }

      function pickArt(portrait, sprite) {
        var a = (portrait || "").trim();
        if (a) return a;
        return (sprite || "").trim();
      }

      function setPortraitImg(el, url, alt) {
        if (!el) return;
        el.onload = null;
        el.onerror = null;
        var u = (url || "").trim();
        if (!u) {
          el.removeAttribute("src");
          el.alt = "";
          el.style.opacity = "0.35";
          return;
        }
        el.alt = alt || "";
        el.style.opacity = "1";
        el.onerror = function () {
          el.removeAttribute("src");
          el.style.opacity = "0.35";
        };
        if (el.getAttribute("src") === u) {
          el.removeAttribute("src");
          void el.offsetWidth;
        }
        el.src = u;
      }

      function pregameFingerprint(d) {
        if (!d || d.battle_status !== "starting") return "";
        var mid = d.match_id != null ? String(d.match_id) : "";
        var u =
          d.battle_updated_at != null ? String(d.battle_updated_at) : "";
        var p1 = String(d.player1_name || "");
        var p2 = String(d.player2_name || "");
        var fmt = String(d.battle_format || "");
        return mid + "|" + u + "|" + p1 + "|" + p2 + "|" + fmt;
      }

      function applyIntroFromScoreboard(data) {
        var p1 = data.player1_name || "Player 1";
        var p2 = data.player2_name || "Player 2";
        $p1name.textContent = p1;
        $p2name.textContent = p2;
        setPortraitImg(
          $p1img,
          pickArt(data.player1_portrait_square_url, data.player1_sprite_url),
          p1
        );
        setPortraitImg(
          $p2img,
          pickArt(data.player2_portrait_square_url, data.player2_sprite_url),
          p2
        );

        if ($fmt) {
          var fmtLine = "";
          if (data.battle_format) {
            var df = displayBattleFormat(data.battle_format);
            if (df && df !== "--") fmtLine = df;
          }
          if (fmtLine) {
            $fmt.textContent = fmtLine;
            $fmt.hidden = false;
          } else {
            $fmt.textContent = "";
            $fmt.hidden = true;
          }
        }

        if ($tourney) {
          var tc = data.tournament_context || {};
          var tline =
            typeof formatTournamentMatchContextLine === "function"
              ? formatTournamentMatchContextLine(tc)
              : "";
          if (tline) {
            $tourney.textContent = tline;
            $tourney.hidden = false;
          } else {
            $tourney.textContent = "";
            $tourney.hidden = true;
          }
        }
      }

      function showIntroSequence(data) {
        if (introMs < 1) return;
        markIntroShownFor(data);
        applyIntroFromScoreboard(data);
        resetIntroBursts();
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        if (burstTimer) clearTimeout(burstTimer);
        $splash.classList.remove("fading");
        void $splash.offsetWidth;
        $splash.classList.add("visible");
        burstTimer = setTimeout(function () {
          burstTimer = null;
          hideTimer = setTimeout(function () {
            hideSplash();
          }, introMs);
        }, 50);
      }

      var useBroadcastHub = /\bembed=broadcast\b/.test(
        location.search || "",
      );

      /* Ignore only stale tournament_intro / intro_gap (older updated_at than we have
         already applied). Do not drop starting/live — a newer live can arrive before an
         older starting out-of-order; dropping starting would skip the matchup intro. */
      var lastBattleUpdatedAt = -1;
      /** When the queue moves to a new manager match row, drop stale sessionStorage for
         that id so match 2+ intros are not blocked by an older tab session or reuse. */
      var lastSeenManagerMatchIdForIntro = null;

      function processScoreboardData(data) {
        if (!data) return;
        var u = data.battle_updated_at;
        var tu = NaN;
        if (u != null) {
          tu = typeof u === "number" ? u : parseFloat(String(u), 10);
        }
        var st = data.battle_status || "idle";

        if (
          (st === "tournament_intro" || st === "intro_gap") &&
          Number.isFinite(tu) &&
          tu < lastBattleUpdatedAt - 1e-6
        ) {
          return;
        }

        if (Number.isFinite(tu)) {
          lastBattleUpdatedAt = Math.max(lastBattleUpdatedAt, tu);
        }

        if (st === "tournament_intro" || st === "intro_gap") {
          clearMatchIntroDedupeForManagerMatch(data);
          if (
            $splash.classList.contains("visible") ||
            $splash.classList.contains("fading")
          ) {
            hideSplash();
          }
          return;
        }

        var midRaw = data.match_id;
        if (midRaw != null && String(midRaw) !== "") {
          var midNum = Number(midRaw);
          if (
            Number.isFinite(midNum) &&
            midNum !== lastSeenManagerMatchIdForIntro
          ) {
            lastSeenManagerMatchIdForIntro = midNum;
            clearMatchIntroDedupeForManagerMatch(data);
          }
        }

        if (
          $splash.classList.contains("visible") &&
          (st === "idle" || st === "error")
        ) {
          hideSplash();
        }

        if (introMs < 1) return;
        if (introWasShownFor(data)) return;

        var isStarting = st === "starting";
        var isLive = st === "live";

        if (isStarting) {
          var fp = pregameFingerprint(data);
          if (!fp) return;
          showIntroSequence(data);
          return;
        }

        if (
          isLive &&
          liveBattleFreshEnoughForIntro(data) &&
          matchIntroDedupeKey(data)
        ) {
          showIntroSequence(data);
        }
      }

      function tickFromFetch() {
        fetch("/scoreboard", { cache: "no-store" })
          .then(function (r) {
            return r.ok ? r.json() : null;
          })
          .then(function (data) {
            processScoreboardData(data);
          })
          .catch(function () {});
      }

      function onHubScoreboardMessage(ev) {
        if (ev.origin !== window.location.origin) return;
        var d = ev.data;
        if (!d || d.type !== "scoreboard" || !d.payload) return;
        processScoreboardData(d.payload);
      }

      if (useBroadcastHub) {
        window.addEventListener("message", onHubScoreboardMessage);
      } else {
        tickFromFetch();
        setInterval(tickFromFetch, 200);
      }
    </script>
  </body>
</html>
