<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Battle Overlay</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff;
      }

      .sidebar {
        position: absolute;
        top: 16px;
        right: 4px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 310px;
        max-width: 310px;
        max-height: 688px;
        align-items: stretch;
      }

      .scoreboard {
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 16px 24px;
        width: 310px;
        max-width: 310px;
        backdrop-filter: blur(8px);
        flex-shrink: 0;
      }

      .scoreboard h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 12px;
        text-align: center;
      }

      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .player-row:last-child {
        border-bottom: none;
      }

      .player-name {
        font-size: 18px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-meta {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .player-model {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        font-variant-numeric: tabular-nums;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-model.model-long {
        font-size: 9px;
      }

      .player-name.red {
        color: #ff6b6b;
      }
      .player-name.blue {
        color: #74b9ff;
      }

      .player-wins {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
        margin-left: 8px;
      }

      .match-count {
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 10px;
      }

      .match-history {
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 12px 16px;
        min-width: 0;
        min-height: 300px;
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        flex: 1 1 0;
        overflow: hidden;
      }

      .match-history h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
        text-align: center;
        flex-shrink: 0;
      }

      .history-scroll {
        overflow-y: auto;
        flex: 1 1 auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .history-scroll::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .history-entry {
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        line-height: 1.4;
      }

      .history-entry:last-child {
        border-bottom: none;
      }

      .history-matchup {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
      }

      .history-format {
        color: rgba(255, 255, 255, 0.4);
        font-weight: 400;
      }

      .history-mark-l {
        color: #ff6b6b;
        font-weight: 600;
      }

      .history-mark-w {
        color: #51cf66;
        font-weight: 600;
      }

      .history-meta {
        color: rgba(255, 255, 255, 0.45);
        font-size: 11px;
        margin-top: 1px;
      }

      .history-context {
        color: rgba(255, 255, 255, 0.42);
        font-size: 11px;
        margin-top: 3px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .history-empty {
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
        text-align: center;
        padding: 24px 8px;
        line-height: 1.5;
      }

      .ticker-bar {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 10px 12px 12px;
        backdrop-filter: blur(8px);
      }

      /* `hidden` must win over `display: flex` above (author CSS beats UA [hidden]). */
      .ticker-bar[hidden] {
        display: none !important;
      }

      .ticker-label {
        flex: 0 0 auto;
        display: block;
        text-align: center;
        padding: 0 0 8px;
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }

      .ticker-viewport {
        flex: 0 0 auto;
        width: 100%;
        min-width: 0;
        margin-top: 10px;
        min-height: 2.5em;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        /* Fade only the right edge so the start of the line is fully readable */
        mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 16px),
          transparent
        );
        -webkit-mask-image: linear-gradient(
          90deg,
          #000 0,
          #000 calc(100% - 16px),
          transparent
        );
      }

      .ticker-viewport.is-static {
        mask-image: none;
        -webkit-mask-image: none;
        justify-content: center;
      }

      .ticker-viewport.is-static .ticker-track {
        animation: none !important;
        transform: none !important;
      }

      .ticker-track {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        width: max-content;
        flex-shrink: 0;
        will-change: transform;
        transform: translateX(0);
        animation: ticker-marquee linear infinite;
        animation-delay: 2s;
        animation-fill-mode: backwards;
      }

      .ticker-group {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        flex-shrink: 0;
        padding: 0 20px;
        font-size: 12px;
        font-weight: 500;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.88);
        white-space: nowrap;
        letter-spacing: 0.01em;
      }

      .ticker-group .ticker-sep {
        color: rgba(255, 255, 255, 0.35);
        padding: 0 0.35em;
      }

      @keyframes ticker-marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .ticker-track {
          animation: none !important;
          transform: none !important;
        }

        .ticker-viewport {
          mask-image: none;
          -webkit-mask-image: none;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="scoreboard">
        <h2>Scoreboard</h2>
        <div class="player-row">
          <div class="player-meta">
            <span class="player-name red" id="p1-name">Player 1</span>
            <span class="player-model" id="p1-model"></span>
          </div>
          <span class="player-wins" id="p1-wins">0</span>
        </div>
        <div class="player-row">
          <div class="player-meta">
            <span class="player-name blue" id="p2-name">Player 2</span>
            <span class="player-model" id="p2-model"></span>
          </div>
          <span class="player-wins" id="p2-wins">0</span>
        </div>
        <div class="match-count" id="match-count">0 matches played</div>
      </div>

      <div class="match-history" id="history-panel">
        <h2>Recent Matches</h2>
        <div class="history-scroll" id="history-scroll"></div>
      </div>

      <div
        class="ticker-bar"
        id="ticker-bar"
        role="region"
        aria-label="Upcoming matches"
      >
        <span class="ticker-label">Up next</span>
        <div class="ticker-viewport" id="ticker-viewport">
          <div class="ticker-track" id="ticker-track" aria-hidden="true">
            <span class="ticker-group" id="ticker-g1"></span>
            <span class="ticker-group" id="ticker-g2"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
    <script>
      function formatDuration(secs) {
        if (!secs || secs <= 0) return "--";
        var m = Math.floor(secs / 60);
        var s = Math.round(secs % 60);
        if (m > 0) return m + "m " + s + "s";
        return s + "s";
      }

      var historyDateTimeFormatter = new Intl.DateTimeFormat("en-GB", {
        timeZone: "UTC",
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23",
      });

      function formatTime(ts) {
        if (!ts || ts <= 0) return "--";
        return historyDateTimeFormatter.format(new Date(ts * 1000)) + " UTC";
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function formatTournamentStageLabel(m) {
        var bracket = m.series_bracket;
        var rn = m.series_round_number;
        var maxWb = m.tournament_max_winners_round;
        if (bracket === "grand_finals") {
          return "Grand Finals";
        }
        if (
          bracket === "winners" &&
          rn != null &&
          rn !== "" &&
          maxWb != null &&
          maxWb !== ""
        ) {
          var r = Number(rn);
          var mx = Number(maxWb);
          if (Number.isFinite(r) && Number.isFinite(mx) && mx > 0) {
            if (r === mx) {
              return "Finals";
            }
            /* "Semifinals" only when there is a real penultimate round (3+ WB rounds) */
            if (r === mx - 1 && mx >= 3) {
              return "Semifinals";
            }
          }
        }
        return "";
      }

      function buildTournamentContextSegments(m, escaper) {
        var escFn = escaper || function (x) { return x; };
        var stage = formatTournamentStageLabel(m);
        var rn = m.series_round_number;
        var mp = m.series_match_position;
        var gn = m.game_number;
        var segs = [];
        if (stage) {
          segs.push(escFn(stage));
        } else if (rn != null && rn !== "") {
          segs.push("R" + escFn(String(rn)));
        }
        if (mp != null && mp !== "") {
          segs.push("M" + escFn(String(mp)));
        }
        if (gn != null && Number(gn) > 1) {
          segs.push("G" + escFn(String(gn)));
        }
        return segs;
      }

      /** Tournament · stage · M# (HTML); empty if not a tournament match. */
      function formatHistoryTournamentContext(m) {
        var tname = m.tournament_name;
        if (tname == null || !String(tname).trim()) return "";
        var name = esc(String(tname).trim());
        var segs = buildTournamentContextSegments(m, esc);
        if (!segs.length) return name;
        return name + " - " + segs.join(" · ");
      }

      var $p1Name = document.getElementById("p1-name");
      var $p1Model = document.getElementById("p1-model");
      var $p1Wins = document.getElementById("p1-wins");
      var $p2Name = document.getElementById("p2-name");
      var $p2Model = document.getElementById("p2-model");
      var $p2Wins = document.getElementById("p2-wins");
      var $matchCount = document.getElementById("match-count");
      var $historyPanel = document.getElementById("history-panel");
      var $historyScroll = document.getElementById("history-scroll");
      var $tickerVp = document.getElementById("ticker-viewport");
      var $tickerTrack = document.getElementById("ticker-track");
      var $tickerG1 = document.getElementById("ticker-g1");
      var $tickerG2 = document.getElementById("ticker-g2");
      var tickerQueuedCount = 0;

      function formatUpcomingMatchLine(m) {
        var a =
          String(m.player1_stream_label || m.player1_persona_label || "").trim() ||
          "TBD";
        var b =
          String(m.player2_stream_label || m.player2_persona_label || "").trim() ||
          "TBD";
        var head = a + " vs " + b;
        var tname = m.tournament_name;
        if (tname == null || !String(tname).trim()) {
          return head;
        }
        var tnm = String(tname).trim();
        var segs = buildTournamentContextSegments(m, function (x) { return x; });
        if (!segs.length) {
          return head + " · " + tnm;
        }
        return head + " · " + tnm + " - " + segs.join(" · ");
      }

      function syncTickerScroll() {
        if (
          !$tickerVp ||
          !$tickerTrack ||
          !$tickerG1 ||
          !$tickerG2
        ) {
          return;
        }
        if (tickerQueuedCount === 0) {
          $tickerVp.classList.add("is-static");
          $tickerTrack.style.animationDuration = "";
          $tickerTrack.style.transform = "";
          $tickerG2.style.display = "none";
          return;
        }
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduce) {
          $tickerVp.classList.add("is-static");
          $tickerTrack.style.animationDuration = "";
          $tickerTrack.style.transform = "";
          $tickerG2.style.display = "none";
          return;
        }
        /*
         * Always run the duplicated marquee when there is queued content (unless reduced motion).
         * Width-based overflow checks flipped after font/layout/reflow and permanently added
         * is-static + hid g2, which killed CSS infinite animation mid-session.
         */
        $tickerVp.classList.remove("is-static");
        $tickerG2.style.display = "";
        var full = $tickerTrack.scrollWidth;
        var half = full > 0 ? full / 2 : 0;
        if (!half) {
          $tickerVp.classList.add("is-static");
          $tickerTrack.style.animationDuration = "";
          $tickerTrack.style.transform = "";
          $tickerG2.style.display = "none";
          return;
        }
        /* Slower crawl; ~half a viewport width per ~7s at the low end */
        var sec = Math.max(42, Math.min(140, half / 22));
        $tickerTrack.style.animationDuration = sec + "s";
      }

      function renderUpcomingTicker(matches) {
        var n = matches && matches.length ? matches.length : 0;
        tickerQueuedCount = n;
        if (n === 0) {
          $tickerG1.textContent = "No matches queued.";
          $tickerG2.textContent = "";
        } else {
          var parts = [];
          for (var i = 0; i < matches.length; i++) {
            parts.push(formatUpcomingMatchLine(matches[i]));
          }
          var line = parts.join("  |  ");
          $tickerG1.textContent = line;
          $tickerG2.textContent = line;
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(syncTickerScroll);
        });
      }

      function renderScoreboard(data) {
        var p1 = data.player1_name || "Player 1";
        var p2 = data.player2_name || "Player 2";
        var wins = data.wins || {};
        var total = data.total_matches || 0;
        var scope = data.scoreboard_scope || "all_time";
        var seriesNote = data.series_footnote || "";

        $p1Name.textContent = p1;
        $p2Name.textContent = p2;
        var m1 = data.player1_model_id || "";
        var m2 = data.player2_model_id || "";
        $p1Model.textContent = m1;
        $p1Model.classList.toggle("model-long", m1.length > 32);
        $p1Model.style.display = m1 ? "" : "none";
        $p2Model.textContent = m2;
        $p2Model.classList.toggle("model-long", m2.length > 32);
        $p2Model.style.display = m2 ? "" : "none";
        $p1Wins.textContent = wins[p1] || 0;
        $p2Wins.textContent = wins[p2] || 0;
        if (scope === "series" && seriesNote) {
          $matchCount.textContent = seriesNote;
        } else {
          $matchCount.textContent =
            total + " match" + (total !== 1 ? "es" : "") + " played";
        }
      }

      function renderHistory(matches) {
        if (!matches || !matches.length) {
          $historyScroll.innerHTML =
            '<div class="history-empty">No matches yet.</div>';
          return;
        }

        var html = "";
        for (var i = 0; i < matches.length; i++) {
          var m = matches[i];
          var winner = m.winner || "";
          var rowP1 = (m.player1_name || "").trim();
          var rowP2 = (m.player2_name || "").trim();
          if (!rowP1 && !rowP2) {
            var fb1 = $p1Name.textContent || "Player 1";
            var fb2 = $p2Name.textContent || "Player 2";
            if (m.winner_side === "p1") {
              rowP1 = m.winner || fb1;
              rowP2 = m.loser || fb2;
            } else if (m.winner_side === "p2") {
              rowP1 = m.loser || fb1;
              rowP2 = m.winner || fb2;
            } else {
              rowP1 = fb1;
              rowP2 = fb2;
            }
          }
          var p1Mark = "";
          var p2Mark = "";
          if (winner) {
            if (winner === rowP1) {
              p1Mark = ' <span class="history-mark-w">(W)</span>';
              p2Mark = ' <span class="history-mark-l">(L)</span>';
            } else if (winner === rowP2) {
              p1Mark = ' <span class="history-mark-l">(L)</span>';
              p2Mark = ' <span class="history-mark-w">(W)</span>';
            }
          }
          var ctxLine = formatHistoryTournamentContext(m);
          var ctxHtml = ctxLine
            ? '<div class="history-context">' + ctxLine + "</div>"
            : "";
          html +=
            '<div class="history-entry">' +
            '<div class="history-matchup">' +
            esc(rowP1) +
            p1Mark +
            " vs " +
            esc(rowP2) +
            p2Mark +
            "</div>" +
            ctxHtml +
            '<div class="history-meta">' +
            formatTime(m.timestamp) +
            " &middot; " +
            formatDuration(m.duration) +
            "</div></div>";
        }
        $historyScroll.innerHTML = html;
      }

      var lastTotal = -1;

      async function refresh() {
        try {
          var scoreP = fetch("/scoreboard", { cache: "no-store" });
          var upP = fetch("/api/manager/queue/upcoming?limit=24", {
            cache: "no-store",
          });
          var resp = await scoreP;
          var data = await resp.json();
          renderScoreboard(data);
          if (data.total_matches !== lastTotal) {
            lastTotal = data.total_matches;
            renderHistory(data.recent_matches || []);
          }
          try {
            var upResp = await upP;
            if (upResp.ok) {
              var upcoming = await upResp.json();
              renderUpcomingTicker(
                Array.isArray(upcoming) ? upcoming : [],
              );
            }
          } catch (_) {}
        } catch (_) {}
      }

      renderHistory([]);
      renderUpcomingTicker([]);
      refresh();
      setInterval(refresh, 10000);
      window.addEventListener("resize", function () {
        syncTickerScroll();
      });
      if (window.matchMedia) {
        window
          .matchMedia("(prefers-reduced-motion: reduce)")
          .addEventListener("change", syncTickerScroll);
      }
    </script>
  </body>
</html>
