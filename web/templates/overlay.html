<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=1280,height=720" />
        <title>Battle Overlay</title>
        <link rel="stylesheet"
              href="/static/broadcast-tokens.css?v={{ cache_bust }}" />
        <link rel="stylesheet"
              href="/static/scoreboard-overlay.css?v={{ cache_bust }}" />
    </head>
    <body>
        <div class="sidebar">
            <div class="scoreboard">
                <h2>Scoreboard</h2>
                <div class="player-row">
                    <div class="player-meta">
                        <div class="player-heading">
                            <img class="overlay-player-portrait"
                                 id="p1-portrait"
                                 alt=""
                                 width="36"
                                 height="36" />
                            <div class="player-heading-text">
                                <span class="player-name red" id="p1-name">Player 1</span>
                                <span class="player-model" id="p1-model"></span>
                            </div>
                        </div>
                    </div>
                    <span class="player-wins" id="p1-wins">0</span>
                </div>
                <div class="player-row">
                    <div class="player-meta">
                        <div class="player-heading">
                            <img class="overlay-player-portrait"
                                 id="p2-portrait"
                                 alt=""
                                 width="36"
                                 height="36" />
                            <div class="player-heading-text">
                                <span class="player-name blue" id="p2-name">Player 2</span>
                                <span class="player-model" id="p2-model"></span>
                            </div>
                        </div>
                    </div>
                    <span class="player-wins" id="p2-wins">0</span>
                </div>
                <div class="match-count" id="match-count">0 matches played</div>
            </div>
            <div class="match-history" id="history-panel">
                <h2>Recent Matches</h2>
                <div class="history-scroll" id="history-scroll"></div>
            </div>
            <div class="ticker-bar"
                 id="ticker-bar"
                 role="region"
                 aria-label="Upcoming matches">
                <span class="ticker-label">Up next</span>
                <div class="ticker-viewport" id="ticker-viewport">
                    <div class="ticker-track" id="ticker-track" aria-hidden="true">
                        <span class="ticker-group" id="ticker-g1"></span>
                        <span class="ticker-loop-spacer" id="ticker-gap-mid" aria-hidden="true">· · · · · · ·</span>
                        <span class="ticker-group" id="ticker-g2"></span>
                        <span class="ticker-loop-spacer" id="ticker-gap-end" aria-hidden="true">· · · · · · ·</span>
                    </div>
                </div>
            </div>
        </div>
        <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
        <script src="/static/text-line-fit.js?v={{ cache_bust }}"></script>
        <script src="/static/scoreboard-stream-client.js?v={{ cache_bust }}"></script>
        <script>
      function formatDuration(secs) {
        if (!secs || secs <= 0) return "--";
        var m = Math.floor(secs / 60);
        var s = Math.round(secs % 60);
        if (m > 0) return m + "m " + s + "s";
        return s + "s";
      }

      var historyDateTimeFormatter = new Intl.DateTimeFormat("en-GB", {
        timeZone: "UTC",
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23",
      });

      function formatTime(ts) {
        if (!ts || ts <= 0) return "--";
        return historyDateTimeFormatter.format(new Date(ts * 1000)) + " UTC";
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g , "&lt;") .replace( />/g, "&gt;");
      }

      function formatTournamentStageLabel(m) {
        var bracket = m.series_bracket;
        var rn = m.series_round_number;
        var maxWb = m.tournament_max_winners_round;
        var ttype = String(m.tournament_type || "");
        if (bracket === "grand_finals") {
          return "Grand Finals";
        }
        if (bracket === "grand_finals_reset") {
          return "Grand Finals Reset";
        }
        if (
          bracket === "winners" &&
          rn != null &&
          rn !== "" &&
          maxWb != null &&
          maxWb !== ""
        ) {
          var r = Number(rn);
          var mx = Number(maxWb);
          if (Number.isFinite(r) && Number.isFinite(mx) && mx > 0) {
            if (r === mx) {
              return ttype === "double_elimination" ? "WB Finals" : "Finals";
            }
            /* "Semifinals" only when there is a real penultimate round (3+ WB rounds) */
            if (r === mx - 1 && mx >= 3) {
              return ttype === "double_elimination" ? "WB Semifinals" : "Semifinals";
            }
            if (r === mx - 2 && mx >= 4) {
              return ttype === "double_elimination" ? "WB Quarterfinals" : "Quarterfinals";
            }
          }
        }
        return "";
      }

      function buildTournamentContextSegments(m, escaper, includeMatchPosition) {
        var escFn = escaper || function (x) { return x; };
        var showMp = includeMatchPosition === true;
        var bracket = m.series_bracket;
        var stage = formatTournamentStageLabel(m);
        var rn = m.series_round_number;
        var mp = m.series_match_position;
        var gn = m.game_number;
        var segs = [];
        if (stage) {
          segs.push(escFn(stage));
        } else if (rn != null && rn !== "") {
          var rlab = escFn(String(rn));
          if (bracket === "losers") {
            segs.push("LB R" + rlab);
          } else {
            segs.push("R" + rlab);
          }
        }
        if (showMp && mp != null && mp !== "") {
          segs.push("M" + escFn(String(mp)));
        }
        if (gn != null) {
          segs.push("G" + escFn(String(gn)));
        }
        return segs;
      }

      /** Tournament · stage · G# (HTML); empty if not a tournament match. M# omitted unless includeMatchPosition. */
      function formatHistoryTournamentContext(m, includeMatchPosition) {
        var tname = m.tournament_name;
        if (tname == null || !String(tname).trim()) return "";
        var name = esc(String(tname).trim());
        var segs = buildTournamentContextSegments(m, esc, includeMatchPosition);
        if (!segs.length) return name;
        return name + " - " + segs.join(" · ");
      }

      var $p1Name = document.getElementById("p1-name");
      var $p1Model = document.getElementById("p1-model");
      var $p1Portrait = document.getElementById("p1-portrait");
      var $p1Wins = document.getElementById("p1-wins");
      var $p2Name = document.getElementById("p2-name");
      var $p2Model = document.getElementById("p2-model");
      var $p2Portrait = document.getElementById("p2-portrait");
      var $p2Wins = document.getElementById("p2-wins");
      var $matchCount = document.getElementById("match-count");
      var $historyPanel = document.getElementById("history-panel");
      var $historyScroll = document.getElementById("history-scroll");
      var $tickerVp = document.getElementById("ticker-viewport");
      var $tickerTrack = document.getElementById("ticker-track");
      var $tickerG1 = document.getElementById("ticker-g1");
      var $tickerG2 = document.getElementById("ticker-g2");
      var $tickerGapMid = document.getElementById("ticker-gap-mid");
      var $tickerGapEnd = document.getElementById("ticker-gap-end");
      var tickerQueuedCount = 0;
      var lastUpcomingMatches = [];
      /** From last scoreboard; used to drop repeated tournament names in Up next. */
      var overlayCurrentTournamentId = null;
      var useBroadcastHub = /\bembed=broadcast\b/.test(
        location.search || "",
      );
      var lastScoreboardSeq = 0;

      function tournamentIdsMatch(qid, currentId) {
        if (qid == null || currentId == null) return false;
        if (qid === "" || currentId === "") return false;
        var a = Number(qid);
        var b = Number(currentId);
        return Number.isFinite(a) && Number.isFinite(b) && a === b;
      }

      function formatUpcomingMatchLine(m, currentTournamentId) {
        var a =
          String(m.player1_stream_label || m.player1_persona_label || "").trim() ||
          "TBD";
        var b =
          String(m.player2_stream_label || m.player2_persona_label || "").trim() ||
          "TBD";
        var head = a + " vs " + b;
        var tname = m.tournament_name;
        if (tname == null || !String(tname).trim()) {
          return head;
        }
        var tnm = String(tname).trim();
        var segs = buildTournamentContextSegments(m, function (x) { return x; });
        var sameTournament = tournamentIdsMatch(
          m.tournament_id,
          currentTournamentId,
        );
        if (sameTournament) {
          if (!segs.length) return head;
          return head + " · " + segs.join(" · ");
        }
        if (!segs.length) {
          return head + " · " + tnm;
        }
        return head + " · " + tnm + " - " + segs.join(" · ");
      }

      function syncTickerScroll() {
        if (
          !$tickerVp ||
          !$tickerTrack ||
          !$tickerG1 ||
          !$tickerG2
        ) {
          return;
        }
        if (tickerQueuedCount === 0) {
          $tickerVp.classList.add("is-static");
          $tickerTrack.classList.remove("ticker-track--single-match");
          $tickerTrack.style.animationDuration = "";
          $tickerTrack.style.transform = "";
          $tickerTrack.style.removeProperty("--ticker-shift");
          $tickerG2.style.display = "none";
          return;
        }
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduce) {
          $tickerVp.classList.add("is-static");
          $tickerTrack.classList.remove("ticker-track--single-match");
          $tickerTrack.style.animationDuration = "";
          $tickerTrack.style.transform = "";
          $tickerTrack.style.removeProperty("--ticker-shift");
          $tickerG2.style.display = "none";
          return;
        }
        /*
         * Always run the duplicated marquee when there is queued content (unless reduced motion).
         * Width-based overflow checks flipped after font/layout/reflow and permanently added
         * is-static + hid g2, which killed CSS infinite animation mid-session.
         */
        $tickerVp.classList.remove("is-static");
        $tickerG2.style.display = "";
        var full = $tickerTrack.scrollWidth;
        var half = full > 0 ? full / 2 : 0;
        /* One loop = width until the second copy lines up (group + optional single-match spacers) */
        var gapPx = 0;
        if (
          $tickerTrack.classList.contains("ticker-track--single-match") &&
          $tickerGapMid
        ) {
          gapPx = Math.round($tickerGapMid.offsetWidth || 0);
        }
        var segPx = Math.max(
          1,
          Math.round(($tickerG1.offsetWidth || half || 0) + gapPx),
        );
        if (!half || !segPx) {
          $tickerVp.classList.add("is-static");
          $tickerTrack.classList.remove("ticker-track--single-match");
          $tickerTrack.style.animationDuration = "";
          $tickerTrack.style.transform = "";
          $tickerTrack.style.removeProperty("--ticker-shift");
          $tickerG2.style.display = "none";
          return;
        }
        $tickerTrack.style.setProperty("--ticker-shift", segPx + "px");
        /* Slower crawl; scale duration to segment width */
        var sec = Math.max(42, Math.min(140, segPx / 22));
        $tickerTrack.style.animationDuration = sec + "s";
      }

      function fillTickerGroup(el, parts) {
        while (el.firstChild) {
          el.removeChild(el.firstChild);
        }
        for (var i = 0; i < parts.length; i++) {
          if (i > 0) {
            var sep = document.createElement("span");
            sep.className = "ticker-sep";
            sep.textContent = "|";
            el.appendChild(sep);
          }
          var chunk = document.createElement("span");
          chunk.className = "ticker-match";
          chunk.textContent = parts[i];
          el.appendChild(chunk);
        }
      }

      function renderUpcomingTicker(matches) {
        lastUpcomingMatches = Array.isArray(matches) ? matches.slice() : [];
        var n = lastUpcomingMatches.length;
        tickerQueuedCount = n;
        if (n === 0) {
          $tickerG1.textContent = "No matches queued.";
          $tickerG2.textContent = "";
          $tickerTrack.classList.remove("ticker-track--single-match");
        } else {
          $tickerTrack.classList.toggle("ticker-track--single-match", n === 1);
          var parts = [];
          for (var i = 0; i < lastUpcomingMatches.length; i++) {
            parts.push(
              formatUpcomingMatchLine(
                lastUpcomingMatches[i],
                overlayCurrentTournamentId,
              ),
            );
          }
          fillTickerGroup($tickerG1, parts);
          fillTickerGroup($tickerG2, parts);
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(syncTickerScroll);
        });
      }

      function pickOverlayPortraitUrl(portraitUrl, spriteUrl) {
        var u = String(portraitUrl || "").trim();
        if (u) return u;
        return String(spriteUrl || "").trim();
      }

      var MODEL_LINE_FONT_MAX_PX = 11;
      var MODEL_LINE_FONT_MIN_PX = 6;
      var HISTORY_CONTEXT_FONT_MAX_PX = 12;
      var HISTORY_CONTEXT_FONT_MIN_PX = 6;

      function refitPlayerModelLines() {
        fitTextLineFontSize($p1Model, MODEL_LINE_FONT_MIN_PX, MODEL_LINE_FONT_MAX_PX);
        fitTextLineFontSize($p2Model, MODEL_LINE_FONT_MIN_PX, MODEL_LINE_FONT_MAX_PX);
      }

      function scheduleRefitPlayerModelLines() {
        afterLayout(refitPlayerModelLines);
      }

      function refitHistoryContextLines() {
        if (!$historyScroll) return;
        var nodes = $historyScroll.querySelectorAll(".history-context");
        for (var i = 0; i < nodes.length; i++) {
          fitTextLineFontSize(
            nodes[i],
            HISTORY_CONTEXT_FONT_MIN_PX,
            HISTORY_CONTEXT_FONT_MAX_PX,
          );
        }
      }

      function scheduleRefitHistoryContextLines() {
        afterLayout(refitHistoryContextLines);
      }

      if (typeof ResizeObserver !== "undefined") {
        (function () {
          var ro = new ResizeObserver(function () {
            scheduleRefitPlayerModelLines();
          });
          if ($p1Model && $p1Model.parentElement) {
            ro.observe($p1Model.parentElement);
          }
          if ($p2Model && $p2Model.parentElement) {
            ro.observe($p2Model.parentElement);
          }
        })();
        (function () {
          if (!$historyScroll) return;
          var roH = new ResizeObserver(function () {
            scheduleRefitHistoryContextLines();
          });
          roH.observe($historyScroll);
        })();
      }

      function applyOverlayPortrait(el, portraitUrl, spriteUrl, altName) {
        if (!el) return;
        var u = pickOverlayPortraitUrl(portraitUrl, spriteUrl);
        var alt = altName ? String(altName) : "";
        if (!u) {
          el.onload = null;
          el.onerror = null;
          if (!el.getAttribute("src")) {
            el.alt = "";
            return;
          }
          el.classList.remove("is-visible");
          el.removeAttribute("src");
          el.alt = "";
          return;
        }
        var cur = el.getAttribute("src") || "";
        if (cur === u) {
          if (el.alt !== alt) el.alt = alt;
          if (el.classList.contains("is-visible")) return;
          if (el.complete && el.naturalWidth > 0) {
            el.classList.add("is-visible");
            return;
          }
          return;
        }
        el.onload = null;
        el.onerror = null;
        el.classList.remove("is-visible");
        el.alt = alt;
        el.onload = function () {
          el.classList.add("is-visible");
        };
        el.onerror = function () {
          el.classList.remove("is-visible");
          el.removeAttribute("src");
        };
        el.src = u;
      }

      function renderScoreboard(data) {
        var p1 = data.player1_name || "Player 1";
        var p2 = data.player2_name || "Player 2";
        var wins = data.wins || {};
        var total = data.total_matches || 0;
        var scope = data.scoreboard_scope || "all_time";
        var seriesNote = data.series_footnote || "";

        $p1Name.textContent = p1;
        $p2Name.textContent = p2;
        applyOverlayPortrait(
          $p1Portrait,
          data.player1_portrait_square_url,
          data.player1_sprite_url,
          p1,
        );
        applyOverlayPortrait(
          $p2Portrait,
          data.player2_portrait_square_url,
          data.player2_sprite_url,
          p2,
        );
        var m1 = data.player1_model_id || "";
        var m2 = data.player2_model_id || "";
        $p1Model.textContent = m1;
        $p1Model.title = m1 || "";
        $p1Model.style.display = m1 ? "" : "none";
        if (!m1) $p1Model.style.removeProperty("font-size");
        $p2Model.textContent = m2;
        $p2Model.title = m2 || "";
        $p2Model.style.display = m2 ? "" : "none";
        if (!m2) $p2Model.style.removeProperty("font-size");
        scheduleRefitPlayerModelLines();
        $p1Wins.textContent = wins[p1] || 0;
        $p2Wins.textContent = wins[p2] || 0;
        if (scope === "series" && seriesNote) {
          $matchCount.textContent = seriesNote;
        } else {
          $matchCount.textContent =
            total + " match" + (total !== 1 ? "es" : "") + " played";
        }
        var tctx = data.tournament_context || {};
        var tid = tctx.tournament_id;
        if (tid != null && tid !== "") {
          var tn = Number(tid);
          overlayCurrentTournamentId = Number.isFinite(tn) ? tn : null;
        } else {
          overlayCurrentTournamentId = null;
        }
      }

      /* ``recent_matches`` is newest-first (index 0 = top). Keep scroll at top so the latest row stays visible; scrolling to scrollHeight showed oldest rows and clipped new ones. */
      function scrollHistoryToNewest() {
        if (!$historyScroll) return;
        requestAnimationFrame(function () {
          $historyScroll.scrollTop = 0;
        });
      }

      function renderHistory(matches) {
        if (!matches || !matches.length) {
          $historyScroll.innerHTML =
            '<div class="history-empty">No matches yet.</div>';
          scrollHistoryToNewest();
          scheduleRefitHistoryContextLines();
          return;
        }

        var html = "";
        for (var i = 0; i < matches.length; i++) {
          var m = matches[i];
          var winner = m.winner || "";
          var rowP1 = (m.player1_name || "").trim();
          var rowP2 = (m.player2_name || "").trim();
          if (!rowP1 && !rowP2) {
            var fb1 = $p1Name.textContent || "Player 1";
            var fb2 = $p2Name.textContent || "Player 2";
            if (m.winner_side === "p1") {
              rowP1 = m.winner || fb1;
              rowP2 = m.loser || fb2;
            } else if (m.winner_side === "p2") {
              rowP1 = m.loser || fb1;
              rowP2 = m.winner || fb2;
            } else {
              rowP1 = fb1;
              rowP2 = fb2;
            }
          }
          var p1Mark = "";
          var p2Mark = "";
          if (winner) {
            if (winner === rowP1) {
              p1Mark = ' <span class="history-mark-w">(W)</span>';
              p2Mark = ' <span class="history-mark-l">(L)</span>';
            } else if (winner === rowP2) {
              p1Mark = ' <span class="history-mark-l">(L)</span>';
              p2Mark = ' <span class="history-mark-w">(W)</span>';
            }
          }
          var ctxLine = formatHistoryTournamentContext(true);
          var ctxHtml = ctxLine
            ? '<div class="history-context">' + ctxLine + "</div>"
            : "";
          html +=
            '<div class="history-entry">' +
            '<div class="history-matchup">' +
            esc(rowP1) +
            p1Mark +
            " vs " +
            esc(rowP2) +
            p2Mark +
            "</div>" +
            ctxHtml +
            '<div class="history-meta">' +
            formatTime(m.timestamp) +
            " &middot; " +
            formatDuration(m.duration) +
            "</div></div>";
        }
        $historyScroll.innerHTML = html;
        scrollHistoryToNewest();
        scheduleRefitHistoryContextLines();
      }

      var _lastHistoryKey = "";

      function _historyKey(matches) {
        if (!matches || !matches.length) return "empty";
        var ids = [];
        for (var i = 0; i < matches.length; i++) {
          var id = matches[i].id;
          ids.push(id !== undefined && id !== null ? String(id) : "?");
        }
        return ids.join(",");
      }

      function applyScoreboardFromHub(data) {
        renderScoreboard(data);
        var rm = data.recent_matches || [];
        var hk = _historyKey(rm);
        if (hk !== _lastHistoryKey) {
          _lastHistoryKey = hk;
          renderHistory(rm);
        }
        renderUpcomingTicker(lastUpcomingMatches);
      }

      async function refreshUpcomingOnly() {
        try {
          var upResp = await fetch(
            "/api/manager/queue/upcoming?limit=24",
            { cache: "no-store" },
          );
          if (upResp.ok) {
            var upcoming = await upResp.json();
            renderUpcomingTicker(
              Array.isArray(upcoming) ? upcoming : [],
            );
          }
        } catch (_) {}
      }

      function onHubScoreboardMessage(ev) {
        if (!ev || ev.source !== window.parent) return;
        var d = ev.data;
        if (!d || d.type !== "scoreboard" || !d.payload) return;
        if (typeof d.seq === "number") {
          if (d.seq === lastScoreboardSeq) return;
          lastScoreboardSeq = d.seq;
        }
        applyScoreboardFromHub(d.payload);
      }

      renderHistory([]);
      renderUpcomingTicker([]);
      if (useBroadcastHub) {
        window.addEventListener("message", onHubScoreboardMessage);
        refreshUpcomingOnly();
        setInterval(refreshUpcomingOnly, 10000);
      } else {
        window.attachScoreboardStream({
          getSeq: function () {
            return lastScoreboardSeq;
          },
          setSeq: function (n) {
            lastScoreboardSeq = n;
          },
          applyOrdered: function (payload) {
            applyScoreboardFromHub(payload);
          },
        });
        refreshUpcomingOnly();
        setInterval(refreshUpcomingOnly, 10000);
      }
      window.addEventListener("resize", function () {
        syncTickerScroll();
        scheduleRefitPlayerModelLines();
        scheduleRefitHistoryContextLines();
      });
      if (window.matchMedia) {
        window
          .matchMedia("(prefers-reduced-motion: reduce)")
          .addEventListener("change", syncTickerScroll);
      }
        </script>
    </body>
</html>
