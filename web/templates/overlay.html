<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Battle Overlay</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff;
      }

      .sidebar {
        position: absolute;
        top: 16px;
        right: 4px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 690px;
      }

      .scoreboard {
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 16px 24px;
        width: 310px;
        max-width: 310px;
        backdrop-filter: blur(8px);
        flex-shrink: 0;
      }

      .scoreboard h2 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 12px;
        text-align: center;
      }

      .player-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .player-row:last-child {
        border-bottom: none;
      }

      .player-name {
        font-size: 18px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-meta {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .player-model {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        font-variant-numeric: tabular-nums;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-model.model-long {
        font-size: 9px;
      }

      .player-name.red {
        color: #ff6b6b;
      }
      .player-name.blue {
        color: #74b9ff;
      }

      .player-wins {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
        margin-left: 8px;
      }

      .match-count {
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 10px;
      }

      .match-history {
        background: rgba(0, 0, 0, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 12px 16px;
        min-width: 280px;
        max-width: 310px;
        height: 450px;
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        flex: 0 0 auto;
        overflow: hidden;
      }

      .match-history h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
        text-align: center;
        flex-shrink: 0;
      }

      .history-scroll {
        overflow-y: auto;
        flex: 1 1 auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .history-scroll::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .history-entry {
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        line-height: 1.4;
      }

      .history-entry:last-child {
        border-bottom: none;
      }

      .history-matchup {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
      }

      .history-format {
        color: rgba(255, 255, 255, 0.4);
        font-weight: 400;
      }

      .history-winner {
        font-weight: 600;
      }

      .history-winner-p1 {
        color: #ff6b6b;
      }

      .history-winner-p2 {
        color: #74b9ff;
      }

      .history-winner-other {
        color: #51cf66;
      }

      .history-meta {
        color: rgba(255, 255, 255, 0.45);
        font-size: 11px;
        margin-top: 1px;
      }

      .history-context {
        color: rgba(255, 255, 255, 0.42);
        font-size: 11px;
        margin-top: 3px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .history-empty {
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
        text-align: center;
        padding: 24px 8px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="scoreboard">
        <h2>Scoreboard</h2>
        <div class="player-row">
          <div class="player-meta">
            <span class="player-name red" id="p1-name">Player 1</span>
            <span class="player-model" id="p1-model"></span>
          </div>
          <span class="player-wins" id="p1-wins">0</span>
        </div>
        <div class="player-row">
          <div class="player-meta">
            <span class="player-name blue" id="p2-name">Player 2</span>
            <span class="player-model" id="p2-model"></span>
          </div>
          <span class="player-wins" id="p2-wins">0</span>
        </div>
        <div class="match-count" id="match-count">0 matches played</div>
      </div>

      <div class="match-history" id="history-panel">
        <h2>Recent Matches</h2>
        <div class="history-scroll" id="history-scroll"></div>
      </div>
    </div>

    <script src="/static/format-utils.js"></script>
    <script>
      function formatDuration(secs) {
        if (!secs || secs <= 0) return "--";
        var m = Math.floor(secs / 60);
        var s = Math.round(secs % 60);
        if (m > 0) return m + "m " + s + "s";
        return s + "s";
      }

      var historyDateTimeFormatter = new Intl.DateTimeFormat("en-GB", {
        timeZone: "UTC",
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23",
      });

      function formatTime(ts) {
        if (!ts || ts <= 0) return "--";
        return historyDateTimeFormatter.format(new Date(ts * 1000)) + " UTC";
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function titleCaseBracketToken(b) {
        if (!b) return "";
        return String(b)
          .split("_")
          .filter(Boolean)
          .map(function (w) {
            return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
          })
          .join(" ");
      }

      /** Tournament name + series slot (S#, bracket, R/M, optional Gn) for scoreboard history. */
      function formatTournamentSeriesContext(m) {
        var bits = [];
        var tname = m.tournament_name;
        if (tname != null && String(tname).trim()) {
          bits.push(esc(String(tname).trim()));
        }
        var sid = m.series_id;
        if (sid != null && sid !== "") {
          var n = Number(sid);
          if (Number.isFinite(n) && n > 0) {
            var segs = ["S#" + n];
            var brk = titleCaseBracketToken(m.series_bracket);
            if (brk) segs.push(brk);
            var rn = m.series_round_number;
            var mp = m.series_match_position;
            if (rn != null && rn !== "") segs.push("R" + rn);
            if (mp != null && mp !== "") segs.push("M" + mp);
            var gn = m.game_number;
            if (gn != null && Number(gn) > 1) segs.push("G" + gn);
            bits.push(esc(segs.join(" · ")));
          }
        }
        if (!bits.length) return "";
        return bits.join(" · ");
      }

      var $p1Name = document.getElementById("p1-name");
      var $p1Model = document.getElementById("p1-model");
      var $p1Wins = document.getElementById("p1-wins");
      var $p2Name = document.getElementById("p2-name");
      var $p2Model = document.getElementById("p2-model");
      var $p2Wins = document.getElementById("p2-wins");
      var $matchCount = document.getElementById("match-count");
      var $historyPanel = document.getElementById("history-panel");
      var $historyScroll = document.getElementById("history-scroll");

      function renderScoreboard(data) {
        var p1 = data.player1_name || "Player 1";
        var p2 = data.player2_name || "Player 2";
        var wins = data.wins || {};
        var total = data.total_matches || 0;
        var scope = data.scoreboard_scope || "all_time";
        var seriesNote = data.series_footnote || "";

        $p1Name.textContent = p1;
        $p2Name.textContent = p2;
        var m1 = data.player1_model_id || "";
        var m2 = data.player2_model_id || "";
        $p1Model.textContent = m1;
        $p1Model.classList.toggle("model-long", m1.length > 32);
        $p1Model.style.display = m1 ? "" : "none";
        $p2Model.textContent = m2;
        $p2Model.classList.toggle("model-long", m2.length > 32);
        $p2Model.style.display = m2 ? "" : "none";
        $p1Wins.textContent = wins[p1] || 0;
        $p2Wins.textContent = wins[p2] || 0;
        if (scope === "series" && seriesNote) {
          $matchCount.textContent = seriesNote;
        } else {
          $matchCount.textContent =
            total + " match" + (total !== 1 ? "es" : "") + " played";
        }
      }

      function renderHistory(matches) {
        if (!matches || !matches.length) {
          $historyScroll.innerHTML =
            '<div class="history-empty">No matches yet.</div>';
          return;
        }

        var html = "";
        for (var i = 0; i < matches.length; i++) {
          var m = matches[i];
          var winner = m.winner || "";
          var rowP1 = (m.player1_name || "").trim();
          var rowP2 = (m.player2_name || "").trim();
          if (!rowP1 && !rowP2) {
            var fb1 = $p1Name.textContent || "Player 1";
            var fb2 = $p2Name.textContent || "Player 2";
            if (m.winner_side === "p1") {
              rowP1 = m.winner || fb1;
              rowP2 = m.loser || fb2;
            } else if (m.winner_side === "p2") {
              rowP1 = m.loser || fb1;
              rowP2 = m.winner || fb2;
            } else {
              rowP1 = fb1;
              rowP2 = fb2;
            }
          }
          var winnerClass = "history-winner-other";
          if (winner === rowP1) winnerClass = "history-winner-p1";
          if (winner === rowP2) winnerClass = "history-winner-p2";
          var fmtLabel = displayBattleFormat(m.battle_format);
          var fmt = fmtLabel
            ? ' <span class="history-format">&middot; ' +
              esc(fmtLabel) +
              "</span>"
            : "";
          var ctxLine = formatTournamentSeriesContext(m);
          var ctxHtml = ctxLine
            ? '<div class="history-context">' + ctxLine + "</div>"
            : "";
          html +=
            '<div class="history-entry">' +
            '<div class="history-matchup">' +
            esc(rowP1) +
            " vs " +
            esc(rowP2) +
            fmt +
            "</div>" +
            "<div>Winner: " +
            '<span class="history-winner ' +
            winnerClass +
            '">' +
            esc(winner) +
            "</span></div>" +
            ctxHtml +
            '<div class="history-meta">' +
            formatTime(m.timestamp) +
            " &middot; " +
            formatDuration(m.duration) +
            "</div></div>";
        }
        $historyScroll.innerHTML = html;
      }

      var lastTotal = -1;

      async function refresh() {
        try {
          var resp = await fetch("/scoreboard", { cache: "no-store" });
          var data = await resp.json();
          renderScoreboard(data);
          if (data.total_matches !== lastTotal) {
            lastTotal = data.total_matches;
            renderHistory(data.recent_matches || []);
          }
        } catch (_) {}
      }

      renderHistory([]);
      refresh();
      setInterval(refresh, 10000);
    </script>
  </body>
</html>
