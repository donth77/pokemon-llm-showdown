<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=1280,height=720" />
        <title>Showdown — battle</title>
        <style>
      html,
      body {
        margin: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: #0b1020;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      .battle-frame {
        position: absolute;
        inset: 0;
        width: 1280px;
        height: 720px;
        border: 0;
        background: #0b1020;
      }
        </style>
        <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
        <script src="/static/scoreboard-stream-client.js?v={{ cache_bust }}"></script>
    </head>
    <body>
        <iframe class="battle-frame"
                id="battle-frame"
                src="{{ showdown_local_url }}"
                title="Pokémon Showdown"
                allow="autoplay; fullscreen"
                allowfullscreen></iframe>
        <script>
      window.__BATTLE_CORE__ = {
        battleFrameId: "battle-frame",
        formatLabelId: null,
        localUrl: "{{ showdown_local_url }}",
      };
      window.__THOUGHTS_FEED__ = {
        hideBattleUi: false,
        syncHeightsIframeId: null,
        panels: null,
        calloutIframeId: "battle-frame",
      };
        </script>
        <script src="/static/broadcast-battle-core.js?v={{ cache_bust }}"></script>
        <script src="/static/broadcast-thoughts-feed.js?v={{ cache_bust }}"></script>
    </body>
</html>
