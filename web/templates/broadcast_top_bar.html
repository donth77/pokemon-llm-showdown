<!DOCTYPE html>
<html lang="en" class="broadcast-page broadcast-page--top-bar">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=1280,height=720" />
        <title>Top bar — {{ stream_title }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Teko:wght@500;600&display=swap"
              rel="stylesheet" />
        <link rel="stylesheet"
              href="/static/broadcast-top-bar.css?v={{ cache_bust }}" />
        <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
        <script src="/static/scoreboard-stream-client.js?v={{ cache_bust }}"></script>
    </head>
    <body class="broadcast-page broadcast-page--top-bar">
        {% include "partials/broadcast_top_bar_strip.html" %}
        <script>
      (function () {
        var label = document.getElementById("battle-format-label");
        var tourneyLabel = document.getElementById("broadcast-tournament-label");

        function applyTopBarFromScoreboard(sb) {
          var data = scoreboardPayloadToBattleShape(sb);
          if (!data) return;
          if (label) {
            label.textContent = formatBroadcastFormatLabel(data);
          }
          if (tourneyLabel) {
            var lineBy = formatTournamentMatchContextLine(data);
            if (lineBy) {
              tourneyLabel.textContent = lineBy;
              tourneyLabel.hidden = false;
            } else {
              tourneyLabel.textContent = "";
              tourneyLabel.hidden = true;
              tourneyLabel.style.removeProperty("font-size");
            }
          }
        }
        var lastSeq = 0;
        attachScoreboardStream({
          getSeq: function () {
            return lastSeq;
          },
          setSeq: function (n) {
            lastSeq = n;
          },
          applyOrdered: applyTopBarFromScoreboard,
          applyFallback: applyTopBarFromScoreboard,
          fallbackIntervalMs: 3000,
        });
      })();
        </script>
    </body>
</html>
