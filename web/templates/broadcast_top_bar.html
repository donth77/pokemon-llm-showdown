<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Top bar — {{ stream_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Teko:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: transparent;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      .top-left-bar {
        position: absolute;
        display: flex;
        left: 0;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: flex-end;
        gap: 14px;
        pointer-events: none;
        align-items: center;
      }

      .stream-title {
        flex-shrink: 1;
        min-width: 0;
        max-width: min(560px, calc(100vw - 340px));
        padding: 10px 24px 10px 16px;
        margin: 0;
        border: none;
        border-left: 4px solid rgba(116, 185, 255, 1);
        border-radius: 0 6px 6px 0;
        box-shadow: 0 0 0 1px rgba(116, 185, 255, 0.12);
        background: linear-gradient(
          90deg,
          rgba(4, 12, 34, 0.92) 0%,
          rgba(6, 14, 40, 0.72) 35%,
          rgba(6, 14, 40, 0.28) 68%,
          transparent 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #f8fafc;
        font-family: "Teko", system-ui, sans-serif;
        font-size: 2.125rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        line-height: 1.05;
        text-shadow:
          0 2px 16px rgba(0, 0, 0, 0.95),
          0 0 40px rgba(116, 185, 255, 0.18),
          0 1px 0 rgba(0, 0, 0, 0.45);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        pointer-events: none;
      }

      @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
        .stream-title {
          background: linear-gradient(
            90deg,
            rgba(8, 16, 38, 0.95) 0%,
            rgba(8, 16, 38, 0.78) 55%,
            transparent 100%
          );
        }
      }

      .battle-format {
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.48);
        color: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        white-space: nowrap;
        pointer-events: none;
      }

      .tournament-info-banner {
        flex-shrink: 1;
        min-width: 0;
        max-width: min(520px, calc(100vw - 320px));
        padding: 6px 18px 7px 13px;
        border: none;
        border-left: 3px solid rgba(186, 168, 255, 0.95);
        border-radius: 0 5px 5px 0;
        box-shadow: 0 0 0 1px rgba(186, 168, 255, 0.1);
        background: linear-gradient(
          90deg,
          rgba(18, 12, 42, 0.9) 0%,
          rgba(18, 12, 42, 0.65) 38%,
          rgba(18, 12, 42, 0.28) 70%,
          transparent 100%
        );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #e8eaff;
        font-family: "Barlow Semi Condensed", system-ui, sans-serif;
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1.3;
        text-align: left;
        white-space: normal;
        word-break: break-word;
        text-shadow:
          0 1px 12px rgba(0, 0, 0, 0.85),
          0 0 28px rgba(186, 168, 255, 0.12);
        pointer-events: none;
        margin: 0 0 0 24px;
      }

      @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
        .tournament-info-banner {
          background: linear-gradient(
            90deg,
            rgba(22, 16, 48, 0.92) 0%,
            rgba(22, 16, 48, 0.72) 60%,
            transparent 100%
          );
        }
      }
    </style>
    <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
  </head>

  <body>
    <div class="top-left-bar">
      <div class="stream-title">{{ stream_title }}</div>
      <div class="battle-format" id="battle-format-label">Format: --</div>
      <div
        class="tournament-info-banner"
        id="broadcast-tournament-label"
        hidden
      ></div>
    </div>
    <script>
      const label = document.getElementById("battle-format-label");
      const tourneyLabel = document.getElementById("broadcast-tournament-label");
      async function refreshFormat() {
        try {
          const resp = await fetch("/current_battle", { cache: "no-store" });
          const data = await resp.json();
          if (label) {
            label.textContent = formatBroadcastFormatLabel(data);
          }
          if (tourneyLabel) {
            var line = formatTournamentMatchContextLine(data);
            if (line) {
              tourneyLabel.textContent = line;
              tourneyLabel.hidden = false;
            } else {
              tourneyLabel.textContent = "";
              tourneyLabel.hidden = true;
            }
          }
        } catch (_) {}
      }
      refreshFormat();
      setInterval(refreshFormat, 3000);
    </script>
  </body>
</html>
