<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1280,height=720" />
    <title>Tournament intro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        color: #fff;
      }

      #tintro-splash {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #tintro-splash.visible {
        opacity: 1;
      }

      #tintro-splash.fading {
        opacity: 0;
      }

      .tintro-burst {
        position: absolute;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 3px solid rgba(255, 220, 150, 0.35);
        animation: tintro-ring 1s ease-out forwards;
      }

      .tintro-burst:nth-child(2) {
        animation-delay: 0.08s;
      }
      .tintro-burst:nth-child(3) {
        animation-delay: 0.16s;
      }

      @keyframes tintro-ring {
        0% {
          transform: scale(0.12);
          opacity: 1;
        }
        100% {
          transform: scale(14);
          opacity: 0;
        }
      }

      .tintro-card {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 28px 44px 32px;
        min-width: 760px;
        max-width: 1180px;
        background: radial-gradient(
          ellipse at center,
          rgba(32, 22, 18, 0.94) 0%,
          rgba(14, 10, 22, 0.92) 70%,
          rgba(0, 0, 0, 0.82) 100%
        );
        border: 2px solid rgba(255, 220, 160, 0.22);
        border-radius: 22px;
        box-shadow:
          0 0 56px rgba(255, 190, 100, 0.18),
          0 26px 52px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(14px);
        transform: scale(0.74);
        opacity: 0;
      }

      #tintro-splash.visible .tintro-card {
        animation: tintro-card-in 0.65s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
      }

      @keyframes tintro-card-in {
        0% {
          transform: scale(0.74);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      #tintro-splash.fading .tintro-card {
        animation: tintro-card-out 0.42s ease forwards;
      }

      @keyframes tintro-card-out {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.94) translateY(16px);
          opacity: 0;
        }
      }

      .tintro-label {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.42em;
        color: rgba(255, 220, 170, 0.7);
        margin-bottom: 14px;
        font-weight: 700;
      }

      .tintro-name {
        font-size: clamp(1.65rem, 3.2vw, 2.4rem);
        font-weight: 900;
        line-height: 1.15;
        margin-bottom: 10px;
        color: #fff8ec;
        text-shadow: 0 2px 28px rgba(0, 0, 0, 0.45);
        max-width: 100%;
      }

      .tintro-meta {
        font-size: 15px;
        font-weight: 600;
        color: rgba(255, 235, 210, 0.88);
        letter-spacing: 0.04em;
        margin-bottom: 22px;
      }

      .tintro-meta span + span::before {
        content: " · ";
        opacity: 0.65;
      }

      .tintro-format {
        font-size: 14px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.78);
        margin-bottom: 20px;
      }

      .tintro-roster-wrap {
        max-width: 1100px;
        margin: 0 auto;
      }

      .tintro-roster-caption {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        color: rgba(200, 210, 255, 0.55);
        margin-bottom: 12px;
        font-weight: 700;
      }

      .tintro-roster {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 10px 12px;
      }

      .tintro-avatar {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        object-fit: cover;
        object-position: center top;
        border: 2px solid rgba(255, 255, 255, 0.22);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        background: rgba(0, 0, 0, 0.35);
        flex-shrink: 0;
      }

      .tintro-avatar[hidden] {
        display: none;
      }

      @media (prefers-reduced-motion: reduce) {
        #tintro-splash {
          transition: opacity 0.2s ease;
        }
        #tintro-splash.fading .tintro-card {
          animation: none;
          opacity: 0;
        }
      }
    </style>
    <script src="/static/format-utils.js?v={{ cache_bust }}"></script>
  </head>
  <body>
    <div id="tintro-splash" aria-live="polite">
      <div class="tintro-burst"></div>
      <div class="tintro-burst"></div>
      <div class="tintro-burst"></div>
      <div class="tintro-card">
        <div class="tintro-label">Tournament</div>
        <div class="tintro-name" id="tintro-title">—</div>
        <div class="tintro-meta" id="tintro-meta"></div>
        <div class="tintro-format" id="tintro-format" hidden></div>
        <div class="tintro-roster-wrap">
          <div class="tintro-roster-caption">Participants</div>
          <div class="tintro-roster" id="tintro-roster"></div>
        </div>
      </div>
    </div>

    <script>
      var $splash = document.getElementById("tintro-splash");
      var $title = document.getElementById("tintro-title");
      var $meta = document.getElementById("tintro-meta");
      var $fmt = document.getElementById("tintro-format");
      var $roster = document.getElementById("tintro-roster");

      var hideTimer = null;
      var lastTournamentIntroKey = null;

      function resetBursts() {
        var root = $splash;
        if (!root) return;
        var bursts = root.querySelectorAll(".tintro-burst");
        bursts.forEach(function (el) {
          var clone = el.cloneNode(true);
          el.parentNode.replaceChild(clone, el);
        });
      }

      function hideSplash() {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        $splash.classList.remove("visible");
        $splash.classList.add("fading");
        hideTimer = setTimeout(function () {
          $splash.classList.remove("fading");
          hideTimer = null;
        }, 520);
      }

      function hideSplashImmediate() {
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        $splash.classList.remove("visible", "fading");
      }

      function tournamentIntroKey(data) {
        var tc = data && data.tournament_context;
        var tid = tc && tc.tournament_id != null ? String(tc.tournament_id) : "";
        if (tid) return "tintro:t" + tid;
        if (data && data.match_id != null) return "tintro:m" + String(data.match_id);
        return "";
      }

      function applyTournamentIntro(data) {
        var tc = data.tournament_context || {};
        var tname = tc.tournament_name != null ? String(tc.tournament_name).trim() : "";
        $title.textContent = tname || "Tournament";

        var bracket =
          typeof displayTournamentBracketType === "function"
            ? displayTournamentBracketType(tc.tournament_type)
            : String(tc.tournament_type || "");
        var bo = tc.tournament_best_of;
        var boN = bo != null && bo !== "" ? parseInt(String(bo), 10) : NaN;
        $meta.innerHTML = "";
        if (bracket) {
          var s1 = document.createElement("span");
          s1.textContent = bracket;
          $meta.appendChild(s1);
        }
        if (Number.isFinite(boN) && boN >= 1) {
          var s2 = document.createElement("span");
          s2.textContent = "Best of " + boN;
          $meta.appendChild(s2);
        }

        var fmtLine = "";
        if (data.battle_format) {
          var df = displayBattleFormat(data.battle_format);
          if (df && df !== "--") fmtLine = df;
        }
        if (fmtLine) {
          $fmt.textContent = fmtLine;
          $fmt.hidden = false;
        } else {
          $fmt.textContent = "";
          $fmt.hidden = true;
        }

        $roster.innerHTML = "";
        var roster = data.tournament_intro_roster;
        if (Array.isArray(roster) && roster.length) {
          roster.forEach(function (row) {
            var url = (row.portrait_square_url || "").trim();
            var slug = (row.persona_slug || "").trim();
            if (!url && !slug) return;
            var img = document.createElement("img");
            img.className = "tintro-avatar";
            img.alt = slug || "Trainer";
            if (url) {
              img.src = url;
              img.onerror = function () {
                img.removeAttribute("src");
                img.style.opacity = "0.35";
              };
            } else {
              img.style.opacity = "0.35";
            }
            $roster.appendChild(img);
          });
        }
      }

      function showSplashIfNeeded(data) {
        var k = tournamentIntroKey(data);
        if (k && lastTournamentIntroKey === k && $splash.classList.contains("visible")) {
          return;
        }
        lastTournamentIntroKey = k || null;
        applyTournamentIntro(data);
        resetBursts();
        if (hideTimer) {
          clearTimeout(hideTimer);
          hideTimer = null;
        }
        $splash.classList.remove("fading");
        void $splash.offsetWidth;
        $splash.classList.add("visible");
      }

      var useBroadcastHub = /\bembed=broadcast\b/.test(location.search || "");

      var lastBattleUpdatedAt = -1;

      function processScoreboardData(data) {
        if (!data) return;
        var u = data.battle_updated_at;
        var tu = NaN;
        if (u != null) {
          tu = typeof u === "number" ? u : parseFloat(String(u), 10);
        }
        var st = data.battle_status || "idle";

        if (
          (st === "tournament_intro" || st === "intro_gap") &&
          Number.isFinite(tu) &&
          tu < lastBattleUpdatedAt - 1e-6
        ) {
          return;
        }

        if (Number.isFinite(tu)) {
          lastBattleUpdatedAt = Math.max(lastBattleUpdatedAt, tu);
        }

        if (st === "tournament_intro") {
          showSplashIfNeeded(data);
          return;
        }

        if (st === "intro_gap") {
          if ($splash.classList.contains("visible")) hideSplash();
          return;
        }

        lastTournamentIntroKey = null;
        if ($splash.classList.contains("visible")) hideSplash();
        else if (
          $splash.classList.contains("fading") &&
          (st === "starting" || st === "live")
        ) {
          hideSplashImmediate();
        }
      }

      function tickFromFetch() {
        fetch("/scoreboard", { cache: "no-store" })
          .then(function (r) {
            return r.ok ? r.json() : null;
          })
          .then(function (data) {
            processScoreboardData(data);
          })
          .catch(function () {});
      }

      function onHubScoreboardMessage(ev) {
        if (ev.origin !== window.location.origin) return;
        var d = ev.data;
        if (!d || d.type !== "scoreboard" || !d.payload) return;
        processScoreboardData(d.payload);
      }

      if (useBroadcastHub) {
        window.addEventListener("message", onHubScoreboardMessage);
      } else {
        tickFromFetch();
        setInterval(tickFromFetch, 200);
      }
    </script>
  </body>
</html>
