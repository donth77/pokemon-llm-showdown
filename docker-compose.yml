services:
  showdown:
    build: ./showdown
    container_name: showdown
    ports:
      - "8000:8000"
    networks:
      - battle-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  overlay:
    build: ./overlay
    container_name: overlay
    environment:
      - STREAM_TITLE=${STREAM_TITLE:-Pokémon Showdown battles with LLMs}
      - HIDE_BATTLE_UI=${HIDE_BATTLE_UI:-1}
      - VICTORY_MODAL_SECONDS=${VICTORY_MODAL_SECONDS:-30}
    ports:
      - "8080:8080"
    volumes:
      - overlay-data:/data
      - replay-data:/replays:ro
      - log-data:/logs:ro
      - state-data:/state:ro
    networks:
      - battle-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  agents:
    build: ./agents
    container_name: agents
    environment:
      - SHOWDOWN_HOST=showdown
      - SHOWDOWN_PORT=8000
      - OVERLAY_HOST=overlay
      - OVERLAY_PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - PLAYER1_PROVIDER=${PLAYER1_PROVIDER}
      - PLAYER1_MODEL=${PLAYER1_MODEL}
      - PLAYER2_PROVIDER=${PLAYER2_PROVIDER}
      - PLAYER2_MODEL=${PLAYER2_MODEL}
      - PLAYER1_PERSONA=${PLAYER1_PERSONA:-aggro}
      - PLAYER2_PERSONA=${PLAYER2_PERSONA:-stall}
      - REPLAY_DIR=/replays
      - LOG_DIR=/logs
      - LOG_RAW_BATTLE=${LOG_RAW_BATTLE:-1}
      - STATE_DIR=/state
      - TURN_DELAY_SECONDS=${TURN_DELAY_SECONDS:-0}
      - DELAY_BETWEEN_MATCHES=${DELAY_BETWEEN_MATCHES:-15}
      # 0 or empty from compose side: run continuous matches (use MATCH_COUNT=1 in .env for a single battle)
      - MATCH_COUNT=${MATCH_COUNT:-0}
    volumes:
      - replay-data:/replays
      - log-data:/logs
      - state-data:/state
    networks:
      - battle-net
    depends_on:
      showdown:
        condition: service_healthy
      overlay:
        condition: service_healthy
    restart: "no"

  stream:
    build: ./stream
    container_name: stream
    ports:
      - "9222:9222"
    environment:
      - SHOWDOWN_HOST=showdown
      - SHOWDOWN_PORT=8000
      - OVERLAY_HOST=overlay
      - OVERLAY_PORT=8080
      - STREAM_VIEW_URL=${STREAM_VIEW_URL:-http://overlay:8080/broadcast}
      - TWITCH_STREAM_KEY=${TWITCH_STREAM_KEY}
      - TWITCH_AUTO_SET_TITLE=${TWITCH_AUTO_SET_TITLE:-1}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:-}
      - TWITCH_OAUTH_TOKEN=${TWITCH_OAUTH_TOKEN:-}
      - TWITCH_BROADCASTER_ID=${TWITCH_BROADCASTER_ID:-}
      - TWITCH_GAME_ID=${TWITCH_GAME_ID:-1982936547}
      - TWITCH_STREAM_TITLE=${TWITCH_STREAM_TITLE:-Pokémon Showdown battles with LLMs}
      - HIDE_BATTLE_UI=${HIDE_BATTLE_UI:-1}
      - STREAM_AUDIO_SOURCE=${STREAM_AUDIO_SOURCE:-pulse}
      - BATTLE_MUSIC_INPUT=${BATTLE_MUSIC_INPUT:-}
      - DISPLAY=:99
    networks:
      - battle-net
    depends_on:
      showdown:
        condition: service_healthy
      overlay:
        condition: service_healthy
    restart: unless-stopped
    shm_size: "2gb"

networks:
  battle-net:
    driver: bridge

volumes:
  overlay-data:
  replay-data:
  log-data:
  state-data:
