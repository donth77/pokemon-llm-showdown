services:
  showdown:
    build:
      context: .
      dockerfile: showdown/Dockerfile
    container_name: showdown
    ports:
      - "8000:8000"
    volumes:
      - ./assets/static/trainers:/showdown/server/static/trainers
    networks:
      - battle-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: ./web
    container_name: web
    environment:
      - STREAM_TITLE=${STREAM_TITLE:-Pokémon Showdown battles with LLMs}
      - HIDE_BATTLE_UI=${HIDE_BATTLE_UI:-1}
      - VICTORY_MODAL_SECONDS=${VICTORY_MODAL_SECONDS:-30}
      - TOURNAMENT_VICTORY_MODAL_SECONDS=${TOURNAMENT_VICTORY_MODAL_SECONDS:-60}
      - VICTORY_SHOW_DELAY_SECONDS=${VICTORY_SHOW_DELAY_SECONDS:-1}
      - MATCH_INTRO_SECONDS=${MATCH_INTRO_SECONDS:-5}
      - PERSONAS_DIR=/personas
      - SHOWDOWN_VIEW_BASE=${SHOWDOWN_VIEW_BASE:-http://localhost:8000}
      - MANAGER_HOST_ENV_FILE=/app/host.env
    ports:
      - "8080:8080"
    volumes:
      - web-data:/data
      - manager-data:/manager-data
      - replay-data:/replays:ro
      - log-data:/logs:ro
      - state-data:/state:ro
      - ./agents/personas:/personas
      - ./assets/static/trainers:/app/static/trainers
      - ./assets/static/portraits:/app/static/portraits
      - ./.env:/app/host.env
    networks:
      - battle-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  agents:
    build: ./agents
    container_name: agents
    environment:
      - SHOWDOWN_HOST=showdown
      - SHOWDOWN_PORT=8000
      - WEB_HOST=web
      - WEB_PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - REPLAY_DIR=/replays
      - LOG_DIR=/logs
      - LOG_RAW_BATTLE=${LOG_RAW_BATTLE:-1}
      - STATE_DIR=/state
      - TURN_DELAY_SECONDS=${TURN_DELAY_SECONDS:-0}
      - DELAY_BETWEEN_MATCHES=${DELAY_BETWEEN_MATCHES:-15}
      - QUEUE_POLL_INTERVAL=${QUEUE_POLL_INTERVAL:-5}
      - TOURNAMENT_INTRO_SECONDS=${TOURNAMENT_INTRO_SECONDS:-0}
      - TOURNAMENT_INTRO_DELAY_SECONDS=${TOURNAMENT_INTRO_DELAY_SECONDS:-0}
      - MATCH_INTRO_STARTING_HOLD_SECONDS=${MATCH_INTRO_STARTING_HOLD_SECONDS:-0.45}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-512}
      - LLM_TURN_TIMEOUT=${LLM_TURN_TIMEOUT:-150}
      - OPENROUTER_STRUCTURED_OUTPUTS=${OPENROUTER_STRUCTURED_OUTPUTS:-auto}
      - OPENROUTER_EXTRA_BODY_JSON=${OPENROUTER_EXTRA_BODY_JSON:-}
      - POKEDEX_TOOL_ENABLED=${POKEDEX_TOOL_ENABLED:-0}
      - POKEDEX_AUTO_ENRICH=${POKEDEX_AUTO_ENRICH:-0}
      - POKEDEX_MAX_LOOKUPS=${POKEDEX_MAX_LOOKUPS:-3}
      - ENABLE_MEMORY=${ENABLE_MEMORY:-0}
      - MEMORY_REFLECTION_INTERVAL=${MEMORY_REFLECTION_INTERVAL:-1}
      - LEARNINGS_UPDATE_INTERVAL=${LEARNINGS_UPDATE_INTERVAL:-3}
      - MAX_MEMORY_ENTRIES=${MAX_MEMORY_ENTRIES:-10}
      - MAX_LEARNINGS_BULLETS=${MAX_LEARNINGS_BULLETS:-30}
      - LLM_MEMORY_REFLECTION_MAX_TOKENS=${LLM_MEMORY_REFLECTION_MAX_TOKENS:-2048}
    volumes:
      - replay-data:/replays
      - log-data:/logs
      - state-data:/state
      - ./agents/personas:/app/personas
    networks:
      - battle-net
    depends_on:
      showdown:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  stream:
    build: ./stream
    container_name: stream
    ports:
      - "9222:9222"
    environment:
      - SHOWDOWN_HOST=showdown
      - SHOWDOWN_PORT=8000
      - WEB_HOST=web
      - WEB_PORT=8080
      - STREAM_VIEW_URL=${STREAM_VIEW_URL:-http://web:8080/broadcast}
      - TWITCH_STREAM_KEY=${TWITCH_STREAM_KEY}
      - TWITCH_AUTO_SET_TITLE=${TWITCH_AUTO_SET_TITLE:-1}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:-}
      - TWITCH_OAUTH_TOKEN=${TWITCH_OAUTH_TOKEN:-}
      - TWITCH_BROADCASTER_ID=${TWITCH_BROADCASTER_ID:-}
      - TWITCH_GAME_ID=${TWITCH_GAME_ID:-850490686}
      - TWITCH_STREAM_TITLE=${TWITCH_STREAM_TITLE:-Pokémon Showdown battles with LLMs}
      - HIDE_BATTLE_UI=${HIDE_BATTLE_UI:-1}
      - STREAM_AUDIO_SOURCE=${STREAM_AUDIO_SOURCE:-pulse}
      - DISPLAY=:99
    networks:
      - battle-net
    depends_on:
      showdown:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    shm_size: "2gb"

networks:
  battle-net:
    driver: bridge

volumes:
  web-data:
  manager-data:
  replay-data:
  log-data:
  state-data:
