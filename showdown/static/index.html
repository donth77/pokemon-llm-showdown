    <style id="hide-battle-ui-style"></style>
    <script>
      // Capture the query params NOW before Showdown's router strips them.
      var __hideBattleUI = new URLSearchParams(window.location.search).has(
        "hide_battle_ui",
      );
      var __initialHash = window.location.hash.replace(/^#/, "");
    </script>
    <script>
      (function () {
        if (!__hideBattleUI) return;

        // Inject aggressive CSS to hide non-battle UI elements.
        var styleEl = document.getElementById("hide-battle-ui-style");
        if (styleEl) {
          styleEl.textContent =
            ".ps-overlay, #header, .mainmenu, .mainmenufooter, .rightmenu, " +
            "#mainmenu, #room-lobby, #room-, #room-battles, .chat-log-add, " +
            "ul.battle-userlist, .battle-log-add { display: none !important; } " +
            "body, .ps-room-opaque { background-image: none !important; background-color: #0b1020 !important; } " +
            ".battle-log { height: 100% !important; width: 330px !important; } " +
            ".battle-options { display: none !important; }";
        }

        var HIDE_SELS = [
          "ul.battle-userlist",
          'div.battle-controls[role="complementary"]',
          ".battle-log-add",
          "#room-battles",
          "#room-lobby",
          "#room-",
          "#header",
          ".mainmenu",
          ".mainmenufooter",
          ".rightmenu",
          ".ps-overlay",
          "#mainmenu",
          ".chat-log-add",
          ".userlist",
        ];

        function hideBattleChrome() {
          document.body.style.backgroundImage = "none";
          document.body.style.backgroundColor = "#0b1020";
          var opaques = document.querySelectorAll(".ps-room-opaque");
          for (var o = 0; o < opaques.length; o++) {
            opaques[o].style.backgroundImage = "none";
            opaques[o].style.backgroundColor = "#0b1020";
          }
          for (var i = 0; i < HIDE_SELS.length; i++) {
            var els = document.querySelectorAll(HIDE_SELS[i]);
            for (var j = 0; j < els.length; j++) {
              els[j].style.cssText = "display:none !important;";
            }
          }
          var rooms = document.querySelectorAll(".ps-room");
          for (var r = 0; r < rooms.length; r++) {
            if (rooms[r].id && rooms[r].id.indexOf("battle-") === -1) {
              rooms[r].style.cssText = "display:none !important;";
            }
          }
        }

        function forceShowBattleRoom() {
          var hash = getBattleHash();
          if (!hash || hash.indexOf("battle-") !== 0) return;
          var rooms = document.querySelectorAll(".ps-room");
          var battleRoom = document.getElementById("room-" + hash);
          if (!battleRoom) {
            // Fallback: find any room whose id contains "battle-"
            for (var k = 0; k < rooms.length; k++) {
              if (rooms[k].id && rooms[k].id.indexOf("battle-") !== -1) {
                battleRoom = rooms[k];
                break;
              }
            }
          }
          if (!battleRoom) return;
          for (var i = 0; i < rooms.length; i++) {
            var room = rooms[i];
            if (room === battleRoom) {
              room.style.cssText =
                "display:block !important;left:0 !important;width:100% !important;" +
                "right:0 !important;opacity:1 !important;visibility:visible !important;" +
                "position:absolute !important;top:55px !important;z-index:100 !important;";
            } else {
              room.style.display = "none";
            }
          }
          // Also hide the tab bar and side menus that overlay on top
          var header = document.getElementById("header");
          if (header) header.style.display = "none";
          var leftmenu = document.querySelector(".leftmenu");
          if (leftmenu) leftmenu.style.display = "none";
        }

        // Showdown's router clears location.hash, so fall back to what
        // we captured before any scripts ran.
        function getBattleHash() {
          var h = location.hash.replace(/^#/, "");
          if (h && h.indexOf("battle-") === 0) return h;
          if (__initialHash && __initialHash.indexOf("battle-") === 0)
            return __initialHash;
          return "";
        }

        var battleSentJoin = {};
        var OrigWS = window.WebSocket;
        window.WebSocket = function (url, protocols) {
          var ws = protocols ? new OrigWS(url, protocols) : new OrigWS(url);

          function joinAndFocusBattle(hash) {
            if (!hash || hash.indexOf("battle-") !== 0 || !window.app) return;
            // Ensure the room object exists locally.
            if (!app.rooms || !app.rooms[hash]) {
              app.joinRoom(hash);
              battleSentJoin[hash] = true;
            } else {
              // Room exists locally but the server join may have been lost
              // (socket wasn't connected during App init). Re-send explicitly.
              if (!battleSentJoin[hash]) {
                app.send("/join " + hash);
                battleSentJoin[hash] = true;
              }
              if (!app.curRoom || app.curRoom.id !== hash) {
                app.focusRoom(hash);
              }
            }
            setTimeout(hideBattleChrome, 80);
            setTimeout(hideBattleChrome, 300);
            setTimeout(forceShowBattleRoom, 100);
            setTimeout(forceShowBattleRoom, 400);
          }

          ws.addEventListener("message", function (evt) {
            try {
              var data = typeof evt.data === "string" ? evt.data : "";
              if (
                data.indexOf("queryresponse|roomlist") !== -1 ||
                data.indexOf("|switch|") !== -1 ||
                data.indexOf("|turn|") !== -1
              ) {
                setTimeout(hideBattleChrome, 80);
                setTimeout(hideBattleChrome, 300);
                setTimeout(forceShowBattleRoom, 100);
              }

              // Once WS is connected (we received a message), join the battle.
              joinAndFocusBattle(getBattleHash());

              // Keep auto-focusing whichever battle room is receiving data.
              if (data.charAt(0) === ">" && data.indexOf("battle-") === 1) {
                var nlIdx = data.indexOf("\n");
                var roomId = data
                  .substring(1, nlIdx > 0 ? nlIdx : data.length)
                  .trim();
                if (
                  roomId.indexOf("battle-") === 0 &&
                  window.app &&
                  window.app.rooms &&
                  window.app.rooms[roomId]
                ) {
                  if (window.app.curRoom !== window.app.rooms[roomId]) {
                    window.app.focusRoom(roomId);
                  }
                  setTimeout(hideBattleChrome, 80);
                  setTimeout(hideBattleChrome, 300);
                  setTimeout(forceShowBattleRoom, 100);
                  setTimeout(forceShowBattleRoom, 400);
                }
              }
            } catch (_) {}
          });

          return ws;
        };
        window.WebSocket.prototype = OrigWS.prototype;
        window.WebSocket.CONNECTING = OrigWS.CONNECTING;
        window.WebSocket.OPEN = OrigWS.OPEN;
        window.WebSocket.CLOSING = OrigWS.CLOSING;
        window.WebSocket.CLOSED = OrigWS.CLOSED;

        window.addEventListener("hashchange", function () {
          // New battle — reset join tracking and join the new room.
          var hash = location.hash.replace(/^#/, "");
          if (hash && hash.indexOf("battle-") === 0) {
            battleSentJoin = {};
            setTimeout(function () {
              if (window.app) {
                app.joinRoom(hash);
                battleSentJoin[hash] = true;
                setTimeout(forceShowBattleRoom, 200);
              }
            }, 300);
          }
          setTimeout(hideBattleChrome, 150);
          setTimeout(hideBattleChrome, 500);
          setTimeout(forceShowBattleRoom, 200);
          setTimeout(forceShowBattleRoom, 600);
        });
        window.addEventListener("load", function () {
          setTimeout(hideBattleChrome, 300);
          setTimeout(forceShowBattleRoom, 400);
        });

        // Aggressively keep hiding chrome and forcing battle room visible.
        setInterval(function () {
          hideBattleChrome();
          forceShowBattleRoom();
        }, 500);

        // Fallback: periodically ensure the battle room is joined and focused.
        setInterval(function () {
          var hash = getBattleHash();
          if (!hash) return;
          if (!window.app) return;

          if (app.rooms && app.rooms[hash]) {
            if (!app.curRoom || app.curRoom.id !== hash) {
              app.focusRoom(hash);
              setTimeout(hideBattleChrome, 150);
            }
            if (!battleSentJoin[hash]) {
              app.send("/join " + hash);
              battleSentJoin[hash] = true;
            }
          } else {
            app.joinRoom(hash);
            battleSentJoin[hash] = true;
          }
          forceShowBattleRoom();
        }, 1000);
      })();
    </script>

    <script>
      (function () {
        var CDN = "https://play.pokemonshowdown.com/";
        if (!window.BattleSound) return;
        BattleSound.getSound = function (url) {
          if (!window.HTMLAudioElement) return;
          var finalUrl = /^https?:\/\//i.test(String(url || ""))
            ? String(url)
            : CDN + String(url || "").replace(/^\/+/, "");
          if (this.soundCache[finalUrl]) return this.soundCache[finalUrl];
          try {
            var sound = document.createElement("audio");
            sound.src = finalUrl;
            sound.volume = this.effectVolume / 100;
            this.soundCache[finalUrl] = sound;
            return sound;
          } catch (_unused) {}
        };
      })();
    </script>

    <script>
      window.onload = function () {
        var CDN = "https://play.pokemonshowdown.com/";
        Config.testclient = false;
        Config.loginserver = "";

        if (window.Dex) {
          Dex.resourcePrefix = CDN;
          Dex.fxPrefix = CDN + "fx/";
          Dex.spritePrefix = CDN + "sprites/";
        }
        if (window.BattleEffects) {
          for (var id in BattleEffects) {
            var url = BattleEffects[id].url;
            if (!url) continue;
            if (url.indexOf("http") === 0) continue;
            var basename = url.replace(/^.*\//, "");
            BattleEffects[id].url = CDN + "fx/" + basename;
          }
        }

        window.app = new App();

        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (node) {
              if (!node.querySelectorAll) return;
              var popup =
                node.classList && node.classList.contains("ps-overlay")
                  ? node
                  : node.querySelector && node.querySelector(".ps-overlay");
              if (!popup) return;
              var btn = popup.querySelector('button[name="close"]');
              if (!btn) {
                var buttons = popup.querySelectorAll("button");
                for (var i = 0; i < buttons.length; i++) {
                  if (/Cancel|close/i.test(buttons[i].textContent)) {
                    btn = buttons[i];
                    break;
                  }
                }
              }
              if (btn) btn.click();
            });
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });

        function dismissLoginPopup() {
          var overlays = document.querySelectorAll(".ps-overlay, .ps-popup");
          overlays.forEach(function (el) {
            var btn = el.querySelector('button[name="close"]');
            if (!btn) {
              var buttons = el.querySelectorAll("button");
              for (var i = 0; i < buttons.length; i++) {
                if (/Cancel|close/i.test(buttons[i].textContent)) {
                  btn = buttons[i];
                  break;
                }
              }
            }
            if (btn) btn.click();
          });
        }
        setTimeout(dismissLoginPopup, 500);
        setTimeout(dismissLoginPopup, 1500);
        setTimeout(dismissLoginPopup, 3000);
      };
