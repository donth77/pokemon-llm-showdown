		<script src="https://play.pokemonshowdown.com/js/battle-sound.js"></script>
		<script>
			(function() {
				var CDN = 'https://play.pokemonshowdown.com/';
				if (!window.BattleSound) return;
				BattleSound.getSound = function(url) {
					if (!window.HTMLAudioElement) return;
					var finalUrl = /^https?:\/\//i.test(String(url || ''))
						? String(url)
						: CDN + String(url || '').replace(/^\/+/, '');
					if (this.soundCache[finalUrl]) return this.soundCache[finalUrl];
					try {
						var sound = document.createElement('audio');
						sound.src = finalUrl;
						sound.volume = this.effectVolume / 100;
						this.soundCache[finalUrl] = sound;
						return sound;
					} catch (_unused) {}
				};
			})();
		</script>

		<script>
			window.onload = function() {
				var params = new URLSearchParams(window.location.search);
				var isBroadcastLayout = params.get('broadcast_layout') === '1';
				var CDN = 'https://play.pokemonshowdown.com/';
				Config.testclient = false;
				Config.loginserver = '';

				if (window.Dex) {
					Dex.resourcePrefix = CDN;
					Dex.fxPrefix = CDN + 'fx/';
					Dex.spritePrefix = CDN + 'sprites/';
				}
				if (window.BattleEffects) {
					for (var id in BattleEffects) {
						var url = BattleEffects[id].url;
						if (!url) continue;
						if (url.indexOf('http') === 0) continue;
						var basename = url.replace(/^.*\//, '');
						BattleEffects[id].url = CDN + 'fx/' + basename;
					}
				}

				window.app = new App();

				if (isBroadcastLayout) {
					var layoutStyle = document.createElement('style');
					layoutStyle.textContent = [
						'#header, .leftmenu, .mainmenufooter, .activitymenu, .chat-log-add, .chatbox, .battle-controls-wrap { display: none !important; }',
						'.ps-room, .ps-room.scrollable { width: 1280px !important; height: 720px !important; overflow: hidden !important; margin: 0 !important; }',
						'.battle, .battle-controls, .battle-log { margin: 0 !important; }',
						'.battle { position: absolute !important; left: 0 !important; top: 0 !important; width: 860px !important; height: 720px !important; max-width: none !important; }',
						'.battle .innerbattle, .battle .backdrop { left: 0 !important; }',
						'.battle-log { position: absolute !important; top: 0 !important; right: 0 !important; width: 420px !important; height: 720px !important; box-sizing: border-box !important; padding-top: 112px !important; padding-bottom: 188px !important; background: rgba(8, 12, 24, 0.68) !important; }',
						'.battle-log .inner, .battle-log .battle-history, .battle-log .battle-log { max-height: none !important; height: 100% !important; }',
					].join('\\n');
					document.head.appendChild(layoutStyle);
				}

				var observer = new MutationObserver(function(mutations) {
					mutations.forEach(function(m) {
						m.addedNodes.forEach(function(node) {
							if (!node.querySelectorAll) return;
							var popup = (node.classList && node.classList.contains('ps-overlay'))
								? node : node.querySelector && node.querySelector('.ps-overlay');
							if (!popup) return;
							var btn = popup.querySelector('button[name="close"]');
							if (!btn) {
								var buttons = popup.querySelectorAll('button');
								for (var i = 0; i < buttons.length; i++) {
									if (/Cancel|close/i.test(buttons[i].textContent)) { btn = buttons[i]; break; }
								}
							}
							if (btn) btn.click();
						});
					});
				});
				observer.observe(document.body, { childList: true, subtree: true });

				function dismissLoginPopup() {
					var overlays = document.querySelectorAll('.ps-overlay, .ps-popup');
					overlays.forEach(function(el) {
						var btn = el.querySelector('button[name="close"]');
						if (!btn) {
							var buttons = el.querySelectorAll('button');
							for (var i = 0; i < buttons.length; i++) {
								if (/Cancel|close/i.test(buttons[i].textContent)) { btn = buttons[i]; break; }
							}
						}
						if (btn) btn.click();
					});
				}
				setTimeout(dismissLoginPopup, 500);
				setTimeout(dismissLoginPopup, 1500);
				setTimeout(dismissLoginPopup, 3000);
			};
		</script>
	</body>
